<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DnD Полная Статистика</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background: #0d1117; color: #c9d1d9; }
        h1 { color: #ffd700; text-align: center; margin-bottom: 10px; }
        h2 { color: #ffd700; margin-top: 30px; border-bottom: 2px solid #30363d; padding-bottom: 10px; }
        h3 { color: #8b949e; margin: 20px 0 10px; }
        .upload-area {
            background: #161b22; padding: 20px; border-radius: 10px; margin-bottom: 20px;
            border: 2px dashed #30363d; text-align: center; position: sticky; top: 0; z-index: 100;
        }
        input[type="file"] { font-size: 16px; padding: 10px; background: #21262d; color: #fff; border: 1px solid #30363d; border-radius: 5px; cursor: pointer; }
        .info { color: #8b949e; margin-top: 10px; }
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .table-container { background: #161b22; border-radius: 10px; padding: 15px; border: 1px solid #30363d; }
        .table-container h3 { margin-top: 0; color: #ffd700; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 14px; }
        th, td { border: 1px solid #30363d; padding: 8px 10px; text-align: left; }
        th { background: #21262d; font-weight: bold; color: #ffd700; }
        .number { text-align: right; }
        .faction-light { color: #ffd700; }
        .faction-dark { color: #a371f7; }
        .highlight { background: #21262d; }
        .stat-badge { display: inline-block; background: #238636; padding: 2px 8px; border-radius: 20px; font-size: 12px; color: white; margin-left: 5px; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .tab-btn.active { background: #ffd700; color: #0d1117; border-color: #ffd700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .record-card { background: #21262d; border-radius: 8px; padding: 15px; margin: 10px 0; }
        .record-value { font-size: 24px; color: #ffd700; font-weight: bold; }
        .record-label { color: #8b949e; font-size: 14px; }
    </style>
</head>
<body>

<h1>📊 DnD ПОЛНАЯ СТАТИСТИКА</h1>

<div class="upload-area">
    <h3>📁 Выбери файл stats_data.json</h3>
    <input type="file" id="fileInput" accept=".json,application/json">
    <div class="info">После выбора файла вся статистика построится автоматически</div>
</div>

<div id="content">
    <p style="text-align: center; color: #8b949e; padding: 50px;">👆 Выбери JSON-файл, чтобы увидеть статистику</p>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(event) {
        try {
            const data = JSON.parse(event.target.result);
            renderFullStats(data);
        } catch (err) {
            document.getElementById('content').innerHTML = '<p style="color: #f85149; text-align: center;">❌ Ошибка: неверный формат JSON</p>';
        }
    };
    reader.readAsText(file);
});

function renderFullStats(data) {
    const players = data.players.filter(p => p.name && p.name !== 'Unknown');
    const totalPlayers = players.length;
    const totalFights = players.reduce((sum, p) => sum + p.wins + p.losses, 0) / 2;
    const lightCount = players.filter(p => p.faction === 'Орден Света').length;
    const darkCount = players.filter(p => p.faction === 'Культ Тьмы').length;
    
    let html = '';
    
    // ===== ОБЩАЯ СТАТИСТИКА =====
    html += '<div class="record-card" style="display: flex; justify-content: space-around; flex-wrap: wrap;">';
    html += `<div><span class="record-value">${totalPlayers}</span><br><span class="record-label">Всего игроков</span></div>`;
    html += `<div><span class="record-value">${totalFights}</span><br><span class="record-label">Всего боёв</span></div>`;
    html += `<div><span class="record-value">${lightCount}</span> <span class="faction-light">🌝</span><br><span class="record-label">Орден Света</span></div>`;
    html += `<div><span class="record-value">${darkCount}</span> <span class="faction-dark">🌚</span><br><span class="record-label">Культ Тьмы</span></div>`;
    html += '</div>';
    
    // ===== ВКЛАДКИ =====
    html += '<div class="nav-tabs">';
    html += '<button class="tab-btn active" onclick="switchTab(\'tops\')">🏆 Топы</button>';
    html += '<button class="tab-btn" onclick="switchTab(\'classes\')">⚔️ Классы</button>';
    html += '<button class="tab-btn" onclick="switchTab(\'races\')">🌍 Расы</button>';
    html += '<button class="tab-btn" onclick="switchTab(\'combos\')">🔄 Комбинации</button>';
    html += '<button class="tab-btn" onclick="switchTab(\'records\')">🏅 Рекорды</button>';
    html += '<button class="tab-btn" onclick="switchTab(\'allplayers\')">👥 Все игроки</button>';
    html += '</div>';
    
    // ===== ТОПЫ =====
    html += '<div id="tab-tops" class="tab-content active">';
    html += '<div class="tables-grid">';
    
    // Топ по победам
    const topWins = [...players].sort((a, b) => b.wins - a.wins).slice(0, 20);
    html += '<div class="table-container"><h3>🏆 Топ-20 по победам</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>Победы</th></tr>';
    topWins.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins}</td></tr>`);
    html += '</table></div>';
    
    // Топ по винрейту (мин 20 боёв)
    const topWinrate = players.filter(p => p.wins + p.losses >= 20)
        .map(p => ({...p, wr: p.wins * 100 / (p.wins + p.losses)}))
        .sort((a, b) => b.wr - a.wr).slice(0, 20);
    html += '<div class="table-container"><h3>📈 Топ-20 по винрейту (20+ боёв)</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>W/L</th><th>Винрейт</th></tr>';
    topWinrate.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins}-${p.losses}</td><td class="number">${p.wr.toFixed(1)}%</td></tr>`);
    html += '</table></div>';
    
    // Топ по боям
    const topFights = [...players].sort((a, b) => (b.wins + b.losses) - (a.wins + a.losses)).slice(0, 20);
    html += '<div class="table-container"><h3>⚔️ Топ-20 по числу боёв</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>Боёв</th><th>W/L</th></tr>';
    topFights.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins + p.losses}</td><td class="number">${p.wins}-${p.losses}</td></tr>`);
    html += '</table></div>';
    
    // Топ по стрику
    const topStreak = [...players].sort((a, b) => b.best - a.best).slice(0, 20);
    html += '<div class="table-container"><h3>🔥 Топ-20 по лучшему стрику</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>Стрик</th></tr>';
    topStreak.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.best}</td></tr>`);
    html += '</table></div>';
    
    // Топ по осколкам/уровню
    const topShards = [...players].sort((a, b) => b.shards - a.shards).slice(0, 20);
    html += '<div class="table-container"><h3>💎 Топ-20 по осколкам</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>Осколки</th><th>Уровень</th></tr>';
    topShards.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.shards}</td><td class="number">${p.level}</td></tr>`);
    html += '</table></div>';
    
    // Топ по фракционным победам
    const topFaction = [...players].sort((a, b) => b.factionWins - a.factionWins).slice(0, 20);
    html += '<div class="table-container"><h3>🌝🌚 Топ-20 по фракционным победам</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Фракция</th><th>Победы</th></tr>';
    topFaction.forEach((p, i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.faction || '—'}</td><td class="number">${p.factionWins}</td></tr>`);
    html += '</table></div>';
    
    html += '</div></div>';
    
    // ===== СТАТИСТИКА ПО КЛАССАМ =====
    html += '<div id="tab-classes" class="tab-content">';
    const classStats = {};
    players.forEach(p => {
        const className = p.name.split('-')[1] || p.name;
        if (!classStats[className]) classStats[className] = { wins: 0, losses: 0, players: 0, shards: 0, best: 0 };
        classStats[className].wins += p.wins;
        classStats[className].losses += p.losses;
        classStats[className].players++;
        classStats[className].shards += p.shards;
        classStats[className].best = Math.max(classStats[className].best, p.best);
    });
    
    html += '<div class="table-container"><h3>⚔️ Статистика по классам</h3><table>';
    html += '<tr><th>Класс</th><th>Игроков</th><th>Победы</th><th>Поражения</th><th>Всего боёв</th><th>Винрейт</th><th>Ср. осколки</th><th>Лучший стрик</th></tr>';
    Object.entries(classStats)
        .map(([name, s]) => ({ name, ...s, total: s.wins + s.losses }))
        .sort((a, b) => b.total - a.total)
        .forEach(c => {
            const wr = c.total > 0 ? (c.wins * 100 / c.total).toFixed(1) : '0.0';
            const avgShards = Math.round(c.shards / c.players);
            html += `<tr><td>${c.name}</td><td class="number">${c.players}</td><td class="number">${c.wins}</td><td class="number">${c.losses}</td><td class="number">${c.total}</td><td class="number">${wr}%</td><td class="number">${avgShards}</td><td class="number">${c.best}</td></tr>`;
        });
    html += '</table></div>';
    html += '</div>';
    
    // ===== СТАТИСТИКА ПО РАСАМ =====
    html += '<div id="tab-races" class="tab-content">';
    const raceStats = {};
    players.forEach(p => {
        const raceName = p.name.split('-')[0];
        if (!raceStats[raceName]) raceStats[raceName] = { wins: 0, losses: 0, players: 0 };
        raceStats[raceName].wins += p.wins;
        raceStats[raceName].losses += p.losses;
        raceStats[raceName].players++;
    });
    
    html += '<div class="table-container"><h3>🌍 Статистика по расам</h3><table>';
    html += '<tr><th>Раса</th><th>Игроков</th><th>Победы</th><th>Поражения</th><th>Всего боёв</th><th>Винрейт</th></tr>';
    Object.entries(raceStats)
        .map(([name, s]) => ({ name, ...s, total: s.wins + s.losses }))
        .sort((a, b) => b.total - a.total)
        .forEach(r => {
            const wr = r.total > 0 ? (r.wins * 100 / r.total).toFixed(1) : '0.0';
            html += `<tr><td>${r.name}</td><td class="number">${r.players}</td><td class="number">${r.wins}</td><td class="number">${r.losses}</td><td class="number">${r.total}</td><td class="number">${wr}%</td></tr>`;
        });
    html += '</table></div>';
    html += '</div>';
    
    // ===== КОМБИНАЦИИ РАСА+КЛАСС =====
    html += '<div id="tab-combos" class="tab-content">';
    const comboStats = {};
    players.forEach(p => {
        if (!comboStats[p.name]) comboStats[p.name] = { wins: 0, losses: 0, players: 0 };
        comboStats[p.name].wins += p.wins;
        comboStats[p.name].losses += p.losses;
        comboStats[p.name].players++;
    });
    
    html += '<div class="table-container"><h3>🔄 Статистика по комбинациям (10+ боёв)</h3><table>';
    html += '<tr><th>Комбинация</th><th>Игроков</th><th>Победы</th><th>Поражения</th><th>Всего</th><th>Винрейт</th></tr>';
    Object.entries(comboStats)
        .map(([name, s]) => ({ name, ...s, total: s.wins + s.losses }))
        .filter(c => c.total >= 10)
        .sort((a, b) => (b.wins / b.total) - (a.wins / a.total))
        .forEach(c => {
            const wr = (c.wins * 100 / c.total).toFixed(1);
            html += `<tr><td>${c.name}</td><td class="number">${c.players}</td><td class="number">${c.wins}</td><td class="number">${c.losses}</td><td class="number">${c.total}</td><td class="number">${wr}%</td></tr>`;
        });
    html += '</table></div>';
    html += '</div>';
    
    // ===== РЕКОРДЫ =====
    html += '<div id="tab-records" class="tab-content">';
    html += '<div class="record-card">';
    const maxWins = players.reduce((max, p) => p.wins > max.wins ? p : max, players[0]);
    const maxStreak = players.reduce((max, p) => p.best > max.best ? p : max, players[0]);
    const maxShards = players.reduce((max, p) => p.shards > max.shards ? p : max, players[0]);
    const maxFights = players.reduce((max, p) => (p.wins + p.losses) > (max.wins + max.losses) ? p : max, players[0]);
    const maxFaction = players.reduce((max, p) => p.factionWins > max.factionWins ? p : max, players[0]);
    const maxTournament = players.reduce((max, p) => p.tournamentWins > max.tournamentWins ? p : max, players[0]);
    
    html += `<p>🏆 <strong>Больше всего побед:</strong> ${maxWins.display} — ${maxWins.wins} побед</p>`;
    html += `<p>🔥 <strong>Лучший стрик:</strong> ${maxStreak.display} — ${maxStreak.best} побед подряд</p>`;
    html += `<p>💎 <strong>Больше всего осколков:</strong> ${maxShards.display} — ${maxShards.shards} (уровень ${maxShards.level})</p>`;
    html += `<p>⚔️ <strong>Больше всего боёв:</strong> ${maxFights.display} — ${maxFights.wins + maxFights.losses} боёв</p>`;
    html += `<p>🌝🌚 <strong>Больше всего фракционных побед:</strong> ${maxFaction.display} — ${maxFaction.factionWins}</p>`;
    html += `<p>👑 <strong>Больше всего чемпионств:</strong> ${maxTournament.display} — ${maxTournament.tournamentWins}</p>`;
    html += '</div>';
    html += '</div>';
    
    // ===== ВСЕ ИГРОКИ =====
    html += '<div id="tab-allplayers" class="tab-content">';
    html += '<div class="table-container"><h3>👥 Все игроки (' + totalPlayers + ')</h3><table>';
    html += '<tr><th>#</th><th>Игрок</th><th>Класс</th><th>W/L</th><th>Винрейт</th><th>Стрик</th><th>Уровень</th><th>Фракция</th></tr>';
    [...players].sort((a, b) => (b.wins + b.losses) - (a.wins + a.losses)).forEach((p, i) => {
        const wr = p.wins + p.losses > 0 ? (p.wins * 100 / (p.wins + p.losses)).toFixed(1) : '0.0';
        const factionIcon = p.faction === 'Орден Света' ? '🌝' : (p.faction === 'Культ Тьмы' ? '🌚' : '');
        html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins}-${p.losses}</td><td class="number">${wr}%</td><td class="number">${p.best}</td><td class="number">${p.level}</td><td>${factionIcon}</td></tr>`;
    });
    html += '</table></div>';
    html += '</div>';
    
    document.getElementById('content').innerHTML = html;
}

// Переключение вкладок
window.switchTab = function(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.add('active');
    event.target.classList.add('active');
};
</script>

</body>
</html>
