<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Статистика</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14; --bg-secondary: #11161d; --bg-card: #161c24; --bg-elevated: #1c2330;
            --border-subtle: #252d38; --text-primary: #e8edf4; --text-secondary: #8b95a5; --text-muted: #5c6675;
            --gold: #ffd700; --purple: #a371f7; --red: #e5534b; --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-xl: 28px;
            --shadow-gold: 0 0 20px rgba(255,215,0,0.15); --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 15% 10%, rgba(255,215,0,0.04) 0%, transparent 50%), radial-gradient(ellipse at 85% 20%, rgba(163,113,247,0.05) 0%, transparent 50%);
            color: var(--text-primary); min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }
        .header { text-align: center; padding: 30px 0 20px; }
        .header-title { font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 900; letter-spacing: -0.03em; background: linear-gradient(135deg, #ffd700 0%, #f0a500 50%, #ffd700 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); margin-bottom: 4px; }
        .header-subtitle { font-size: 0.9rem; color: var(--text-secondary); font-weight: 400; }

        .nav-wrapper { margin-bottom: 28px; }
        .nav-toggle { display: none; width: 100%; padding: 14px 20px; background: var(--bg-secondary); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); color: var(--gold); font-size: 1rem; font-weight: 700; cursor: pointer; text-align: left; font-family: inherit; transition: var(--transition); }
        .nav-toggle:hover { background: var(--bg-elevated); }
        .nav-bar { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; padding: 8px; background: var(--bg-secondary); border-radius: var(--radius-xl); border: 1px solid var(--border-subtle); }
        .nav-link { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 20px; color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; transition: var(--transition); white-space: nowrap; }
        .nav-link:hover { color: var(--text-primary); background: var(--bg-elevated); }
        .nav-link.active { background: var(--gold); color: var(--bg-primary); font-weight: 700; box-shadow: var(--shadow-gold); }

        .fixed-buttons { position: fixed; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 1000; opacity: 0.85; transition: opacity 0.2s; }
        .fixed-buttons:hover { opacity: 1; }
        .action-btn { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-subtle); border-radius: 25px; padding: 8px 14px; font-size: 0.78rem; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 6px; transition: var(--transition); text-decoration: none; font-family: inherit; font-weight: 600; }
        .action-btn:hover { background: #252d38; color: #fff; }
        .beer-btn { background: #c49600; color: #1a1a1a; border-color: var(--gold); font-weight: 700; }
        .beer-btn:hover { background: var(--gold); }

        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 20px 14px; text-align: center; transition: var(--transition); position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.4; }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,215,0,0.3); }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--gold); }
        .stat-label { color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }
        .faction-light { color: var(--gold); }
        .faction-dark { color: var(--purple); }

        .nav-tabs { display: flex; gap: 6px; margin: 20px 0; padding: 6px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: var(--text-secondary); padding: 10px 16px; border-radius: var(--radius-md); cursor: pointer; font-size: 0.82rem; font-weight: 600; font-family: inherit; transition: var(--transition); white-space: nowrap; }
        .tab-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
        .tab-btn.active { background: var(--gold); color: var(--bg-primary); font-weight: 700; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .tables-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; }

        .card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 18px; position: relative; overflow: hidden; margin-bottom: 16px; }
        .card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
        .card-title { font-size: 0.95rem; font-weight: 700; color: var(--gold); margin-bottom: 12px; }

        .table-container { border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); overflow-x: auto; -webkit-overflow-scrolling: touch; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: auto; }
        th { background: var(--bg-elevated); color: var(--gold); font-weight: 700; padding: 8px 10px; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--border-subtle); white-space: nowrap; }
        td { padding: 7px 10px; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .number { text-align: right; font-variant-numeric: tabular-nums; }
        td:first-child { font-weight: 600; color: var(--gold); }

        .sortable-header { cursor: pointer; user-select: none; position: relative; padding-right: 20px !important; }
        .sortable-header:hover { background: #252d38 !important; }
        .sortable-header::after { content: '⇅'; position: absolute; right: 5px; opacity: 0.4; font-size: 10px; }
        .sortable-header.asc::after { content: '↑'; opacity: 1; color: var(--gold); }
        .sortable-header.desc::after { content: '↓'; opacity: 1; color: var(--gold); }

        .search-box { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
        .search-input { padding: 8px 14px; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 20px; color: var(--text-primary); font-size: 0.82rem; font-family: inherit; width: 220px; }
        .search-input:focus { outline: none; border-color: var(--gold); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-clear { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; padding: 4px 8px; }
        .search-clear:hover { color: var(--gold); }
        .highlight { background: rgba(255,215,0,0.2); padding: 0 2px; border-radius: 3px; }

        /* Titles */
        .titles-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 24px; }
        .title-card { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--border-subtle); transition: var(--transition); }
        .title-card:hover { transform: translateY(-2px); border-color: var(--gold); }
        .title-emoji { font-size: 1.3rem; }
        .title-name { color: var(--gold); font-weight: 700; margin: 4px 0; font-size: 0.85rem; }
        .title-cond { color: var(--text-muted); font-size: 0.68rem; margin-bottom: 8px; }
        .title-progress { background: var(--bg-card); height: 5px; border-radius: 3px; margin: 6px 0; }
        .title-progress-fill { background: var(--gold); height: 5px; border-radius: 3px; }
        .title-holders { color: var(--text-muted); font-size: 0.7rem; }

        /* Hunters */
        .hunters-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
        .hunter-card { background: var(--bg-elevated); border: 1px solid rgba(255,215,0,2); border-radius: var(--radius-md); padding: 18px 12px; text-align: center; }
        .hunter-medal { font-size: 1.8rem; }
        .hunter-name { font-size: 1rem; color: var(--gold); font-weight: 700; }
        .hunter-count { color: var(--text-muted); font-size: 0.78rem; margin: 4px 0; }
        .hunter-titles { font-size: 0.7rem; color: var(--gold); }

        /* Records */
        .records-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 16px 0; }
        .record-item { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 14px; border-left: 3px solid var(--gold); }
        .record-value { font-size: 1.3rem; color: var(--gold); font-weight: 800; }
        .record-label { color: var(--text-muted); font-size: 0.7rem; margin-top: 2px; }

        /* Champion */
        .champion-block { background: var(--bg-elevated); border: 1px solid rgba(255,215,0,2); border-radius: var(--radius-md); padding: 22px; text-align: center; margin-bottom: 16px; }
        .champion-emoji { font-size: 2.5rem; }
        .champion-name { font-size: 1.3rem; color: var(--gold); font-weight: 800; }
        .champion-class { font-size: 0.85rem; color: var(--text-muted); }

        /* Rating */
        .rating-card { background: var(--bg-elevated); border-radius: var(--radius-md); padding: 18px; text-align: center; border: 1px solid var(--border-subtle); }
        .rating-medal { font-size: 1.8rem; margin-bottom: 6px; }
        .rating-name { font-size: 1rem; color: var(--gold); font-weight: 700; }
        .rating-skill { font-size: 1.5rem; color: var(--gold); font-weight: 800; margin: 8px 0; }

        .status-message { text-align: center; padding: 40px; color: var(--text-secondary); }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border-subtle); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

		@media (max-width: 768px) {
			.container { padding: 12px 14px 32px; }
			.nav-toggle { display: block; }
			.nav-bar { display: none; flex-direction: column; gap: 2px; margin-top: 8px; padding: 4px; }
			.nav-bar.show { display: flex; }
			.nav-link { padding: 12px 16px; border-radius: var(--radius-sm); justify-content: center; }
			.header-title { font-size: 1.8rem; }

			.stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
			.stat-card { padding: 14px 10px; }
			.stat-value { font-size: 1.5rem; }
			.tables-grid { grid-template-columns: 1fr; }

			.nav-tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 6px; }
			.tab-btn { text-align: center; padding: 8px 6px; font-size: 0.75rem; white-space: nowrap; }

			#tab-tops .table-container { overflow-x: visible; }
			#tab-tops table { min-width: auto; font-size: 0.68rem; }
			#tab-tops td { white-space: normal; word-break: break-word; padding: 5px 6px; }
			#tab-tops td:first-child { min-width: auto; width: 28px; }
			#tab-tops th:first-child { min-width: auto; width: 28px; }

			#classes-table, #races-table, #combos-table, #champions-table, #shards-table, #rating-table, #players-table { min-width: 480px; font-size: 0.7rem; }
			th, td { padding: 6px 8px; }
			th { white-space: nowrap; }
			td { white-space: nowrap; }

			#classes-table td:first-child, #races-table td:first-child, #combos-table td:first-child { white-space: normal; word-break: break-word; min-width: 120px; }
			#classes-table th:first-child, #races-table th:first-child, #combos-table th:first-child { min-width: 120px; }

			#champions-table td:first-child, #shards-table td:first-child, #rating-table td:first-child, #players-table td:first-child { min-width: 36px; font-size: 0.65rem; white-space: nowrap; text-align: center; }
			#champions-table th:first-child, #shards-table th:first-child, #rating-table th:first-child, #players-table th:first-child { min-width: 36px; }

			#combos-table td:first-child { white-space: nowrap; min-width: 130px; }

			.titles-gallery { grid-template-columns: repeat(2, 1fr) !important; }
			.hunters-top { grid-template-columns: repeat(3, 1fr); gap: 6px; }
			.hunter-card { padding: 12px 6px; }
			.hunter-name { font-size: 0.8rem; }

			.champion-block > div:last-child {
				display: flex !important; justify-content: space-around; gap: 8px;
				margin-top: 12px; flex-wrap: nowrap;
			}
			.champion-block > div:last-child > div {
				flex: 1; text-align: center; display: flex;
				flex-direction: column; justify-content: space-between; min-height: 52px;
			}
			.champion-block > div:last-child span[style*="font-size: 1.5rem"] { font-size: 1.2rem !important; white-space: nowrap; }
			.champion-block > div:last-child span[style*="color: var(--text-muted)"] { font-size: 0.6rem !important; line-height: 1.3; }

			.fixed-buttons { top: 8px; right: 8px; }
			.action-btn { padding: 6px 10px; font-size: 0.7rem; }
			.search-input { width: 100%; }
		}
    </style>
</head>
<body>
    <div class="container">
        <header class="header"><h1 class="header-title">СТАТИСТИКА</h1><p class="header-subtitle">1 Сезон - Эра Раскола</p></header>

        <div class="nav-wrapper">
            <button class="nav-toggle" onclick="toggleNav()">☰ Меню</button>
            <nav class="nav-bar" id="pageNav">
                <a href="index.html" class="nav-link active">📊 Статистика</a><a href="logs.html" class="nav-link">📜 Логи</a>
                <a href="calc.html" class="nav-link">🎲 Калькулятор</a><a href="balance.html" class="nav-link">⚖️ Баланс</a>
                <a href="simulator.html" class="nav-link">🧪 Симулятор</a><a href="gradient.html" class="nav-link">📈 Градиент</a>
                <a href="guide.html" class="nav-link">⚔️ Гайд</a><a href="hall.html" class="nav-link">🏆 Зал Славы</a>
                <a href="lore.html" class="nav-link">📜 Лор</a><a href="tavern.html" class="nav-link">🍺 Таверна</a>
                <a href="dungeon.html" class="nav-link">🏔 Подземелье</a>
            </nav>
        </div>

        <div class="fixed-buttons">
            <a href="https://www.donationalerts.com/r/rvotaenota" target="_blank" class="action-btn beer-btn">🍺 НА ПИВО</a>
        </div>

        <div id="content"><div class="status-message"><div class="spinner"></div><p>Загрузка статистики...</p></div></div>
    </div>

    <script>
        function toggleNav() {
            const nav = document.getElementById('pageNav'), btn = document.querySelector('.nav-toggle');
            nav.classList.toggle('show'); btn.textContent = nav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
        }
        document.querySelectorAll('.nav-link').forEach(l => l.addEventListener('click', () => {
            document.getElementById('pageNav').classList.remove('show');
            document.querySelector('.nav-toggle').textContent = '☰ Меню';
        }));

        // ==================== АВТО-ДЕТЕКЦИЯ RAW/CDN ====================
        const JSON_URL_RAW = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/stats_data.json';
        const DATA_URL_RAW = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/data.json';
        const JSON_URL_CDN = 'https://cdn.jsdelivr.net/gh/rvotaenotaTTV/dnd-stats@main/stats_data.json';
        const DATA_URL_CDN = 'https://cdn.jsdelivr.net/gh/rvotaenotaTTV/dnd-stats@main/data.json';

        function fetchWithTimeout(url, timeout = 3000) {
            return Promise.race([
                fetch(url).then(r => { if (!r.ok) throw new Error('Status ' + r.status); return r; }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))
            ]);
        }

        let classesData = [];
        let racesData = [];
        let classEmojis = {};
        let raceEmojis = {};
        let players = [];
        let achievements = [];

        fetchWithTimeout(DATA_URL_RAW)
            .catch(() => { console.warn('⚠️ Raw GitHub не отвечает, переключаемся на CDN'); return fetch(DATA_URL_CDN); })
            .then(r => r.json())
            .then(data => {
                classesData = data.classes; racesData = data.races;
                classEmojis = Object.fromEntries(classesData.map(c => [c.Name, c.Emoji]));
                raceEmojis = Object.fromEntries(racesData.map(r => [r.Name, r.Emoji]));
                return fetchWithTimeout(JSON_URL_RAW).catch(() => fetch(JSON_URL_CDN));
            })
            .then(r => r.json())
            .then(data => { players = data.players.filter(p => p.name && p.name !== 'Unknown'); renderFullStats(data); })
            .catch(err => { console.error('Ошибка загрузки:', err); document.getElementById('content').innerHTML = `<div class="status-message" style="color:var(--red);">❌ Ошибка загрузки данных<br>${err.message}</div>`; });

        // ==================== РЕНДЕР СТАТИСТИКИ ====================
        function renderFullStats(data) {
            const totalPlayers = players.length;
            const totalFights = Math.floor(players.reduce((sum, p) => sum + p.wins + p.losses, 0) / 2);
            const lightCount = players.filter(p => p.faction === 'Орден Света').length;
            const darkCount = players.filter(p => p.faction === 'Культ Тьмы').length;

            let html = '';

            // Стат-карточки
            html += '<div class="stats-grid">';
            html += `<div class="stat-card"><div class="stat-value">${totalPlayers}</div><div class="stat-label">👥 Всего игроков</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${totalFights}</div><div class="stat-label">⚔️ Всего боёв</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${lightCount} <span class="faction-light">🌝</span></div><div class="stat-label">Орден Света</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${darkCount} <span class="faction-dark">🌚</span></div><div class="stat-label">Культ Тьмы</div></div>`;
            const fs = data.factionScore || {};
            const factionLight = fs.battleLight || 0;
            const factionDark = fs.battleDark || 0;
            html += `<div class="stat-card"><div class="stat-value">${factionLight} : ${factionDark}</div><div class="stat-label">🌝 Свет vs Тьма 🌚</div></div>`;
            html += '</div>';

            // Вкладки
            html += '<div class="nav-tabs">';
            html += '<button class="tab-btn active" onclick="switchTab(\'tops\')">🏆 Топы</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'classes\')">⚔️ Классы</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'races\')">🌍 Расы</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'combos\')">🔄 Комбинации</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'records\')">🏅 Рекорды</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'champions\')">👑 Чемпионы</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'titles\')">🏅 Титулы</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'shards\')">💎 Осколки</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'rating\')">🏆 Рейтинг</button>';
            html += '<button class="tab-btn" onclick="switchTab(\'allplayers\')">👥 Игроки</button>';
            html += '</div>';

            // TОПЫ
            html += '<div id="tab-tops" class="tab-content active"><div class="tables-grid">';
            const topWins = [...players].sort((a,b) => b.wins - a.wins).slice(0,15);
            html += '<div class="card"><div class="card-title">🏆 Топ-15 по победам</div><div class="table-container"><table><tr><th>#</th><th>Игрок</th><th>Класс</th><th>Победы</th></tr>';
            topWins.forEach((p,i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins}</td></tr>`);
            html += '</table></div></div>';

            const topWinrate = players.filter(p => p.wins+p.losses >= 20).map(p => ({...p, wr: p.wins*100/(p.wins+p.losses)})).sort((a,b) => b.wr - a.wr).slice(0,15);
            html += '<div class="card"><div class="card-title">📈 Топ-15 по винрейту</div><div class="table-container"><table><tr><th>#</th><th>Игрок</th><th>W/L</th><th>Винрейт</th></tr>';
            topWinrate.forEach((p,i) => html += `<tr><td>${i+1}</td><td>${p.display}</td><td class="number">${p.wins}-${p.losses}</td><td class="number">${p.wr.toFixed(1)}%</td></tr>`);
            html += '</table></div></div>';

            const topFights = [...players].sort((a,b) => (b.wins+b.losses) - (a.wins+a.losses)).slice(0,15);
            html += '<div class="card"><div class="card-title">⚔️ Топ-15 по боям</div><div class="table-container"><table><tr><th>#</th><th>Игрок</th><th>Боёв</th><th>W/L</th></tr>';

                const holders = titleCounts[fullName]||0;
                const percent = (holders/players.length)*100;
                html += `<div class="title-card"><div class="title-emoji">${ach.emoji}</div><div class="title-name">${ach.name}</div><div class="title-cond">${ach.type==='level'?ach.value+' уровень':ach.type==='wins'?ach.value+' побед':ach.type==='losses'?ach.value+' поражений':ach.type==='best'?'Стрик '+ach.value:ach.type==='fights'?ach.value+' боёв':ach.type==='tournament'?ach.value+' турнирных побед':ach.type==='faction'?ach.value+' побед за '+ach.faction:ach.type==='winrate'?'Винрейт '+ach.value+'%':ach.type==='balance'?'Побед = Поражений':'Текущий чемпион'}</div><div class="title-progress"><div class="title-progress-fill" style="width:${percent}%;"></div></div><div class="title-holders">👤 ${holders} игроков</div></div>`;
            });
            html += '</div>';

            html += '<div class="card"><div class="card-title">🔍 Прогресс игрока</div><input type="text" id="title-player-search" class="search-input" placeholder="Введите ник..." style="width:100%;margin-bottom:12px;" oninput="showPlayerProgress(this.value)"><div id="player-progress-result" style="display:grid;gap:10px;"><span style="color:var(--text-muted);">Введите ник, чтобы увидеть прогресс</span></div></div>';
            html += '</div>';

            // РЕЙТИНГ
            html += '<div id="tab-rating" class="tab-content">';
            const seasonTop = data.seasonTop || [];
            html += '<div class="card"><div class="card-title">🏆 Сезонный рейтинг (SKILL)</div>';
            if(seasonTop.length > 0){
                html += '<div class="table-container"><table id="rating-table"><thead><tr><th class="sortable-header" data-sort="rank">#</th><th class="sortable-header" data-sort="name">Игрок</th><th class="sortable-header" data-sort="class">Класс</th><th class="sortable-header" data-sort="skill">Skill</th><th class="sortable-header" data-sort="wl">W/L</th><th class="sortable-header" data-sort="winrate">Винрейт</th></tr></thead><tbody id="rating-tbody">';
                seasonTop.forEach((p,i) => {
                    const player = players.find(pl => pl.display === p.display) || {};
                    const total = p.wins + p.losses;
                    const wr = total > 0 ? (p.wins * 100 / total).toFixed(1) : '0.0';
                    const rank = i + 1;
                    const medal = rank === 1 ? '🥇' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : rank));
                    html += `<tr data-rank="${rank}" data-name="${p.display}" data-class="${player.name||''}" data-skill="${p.skill}" data-wl="${total}" data-winrate="${wr}">`;
                    html += `<td style="color:${rank<=3?'var(--gold)':'var(--text-muted)'};font-weight:${rank<=3?'700':'400'};">${medal}</td><td>${p.emoji||'🏆'} ${p.display}</td><td>${player.name||'—'}</td><td class="number" style="color:var(--gold);font-weight:700;">${p.skill}</td><td class="number">${p.wins}-${p.losses}</td><td class="number">${wr}%</td></tr>`;
                });
                html += '</tbody></table></div>';
                html += '<div style="margin-top:12px;padding:12px;background:var(--bg-elevated);border-radius:var(--radius-sm);border:1px solid var(--border-subtle);font-size:0.75rem;color:var(--text-muted);line-height:1.6;"><span style="color:var(--gold);">📐 Как считается рейтинг:</span><br><code style="color:var(--text-secondary);">Skill ≈ (Победы × Винрейт × 10 + Стрик × 5 + Уровень × 3) ÷ √(Боёв / 100 + 1)</code></div>';
            } else {
                html += '<div style="text-align:center;padding:40px;color:var(--text-muted);">Нет данных рейтинга</div>';
            }
            html += '</div></div>';

            // ОСКОЛКИ
            html += '<div id="tab-shards" class="tab-content"><div class="card"><div class="card-title">💎 Топ коллекционеров осколков</div><div class="table-container"><table id="shards-table"><thead><tr><th class="sortable-header" data-sort="rank">#</th><th class="sortable-header" data-sort="name">Игрок</th><th class="sortable-header" data-sort="class">Класс</th><th class="sortable-header" data-sort="shards">Осколки</th><th class="sortable-header" data-sort="level">Уровень</th><th class="sortable-header" data-sort="faction">Фракция</th></tr></thead><tbody id="shards-tbody">';
            [...players].sort((a,b) => b.shards - a.shards).forEach((p,i) => {
                const fi = p.faction === 'Орден Света' ? '🌝' : (p.faction === 'Культ Тьмы' ? '🌚' : '');
                html += `<tr data-rank="${i+1}" data-name="${p.display}" data-class="${p.name}" data-shards="${p.shards}" data-level="${p.level}" data-faction="${fi}"><td>${i+1}</td><td>${p.emoji} ${p.display}</td><td>${p.name}</td><td class="number">${p.shards}</td><td class="number">${p.level}</td><td>${fi}</td></tr>`;
            });
            html += '</tbody></table></div></div></div>';

            // ВСЕ ИГРОКИ
            html += '<div id="tab-allplayers" class="tab-content"><div class="card"><div class="card-title">👥 Все игроки ('+totalPlayers+')</div><div class="search-box"><input type="text" id="player-search" class="search-input" placeholder="🔍 Поиск по имени или классу..."><button id="clear-search" class="search-clear">✕</button><span id="search-result" style="color:var(--text-muted);margin-left:auto;"></span></div><div class="table-container"><table id="players-table"><thead><tr><th class="sortable-header" data-sort="index">#</th><th class="sortable-header" data-sort="name">Name</th><th class="sortable-header" data-sort="class">Class</th><th class="sortable-header" data-sort="wl">W/L</th><th class="sortable-header" data-sort="winrate">Winrate</th><th class="sortable-header" data-sort="streak">Streak</th><th class="sortable-header" data-sort="worst">Worst</th><th class="sortable-header" data-sort="level">Level</th><th class="sortable-header" data-sort="faction">Faction</th></tr></thead><tbody id="players-tbody">';
            [...players].sort((a,b) => (b.wins+b.losses) - (a.wins+a.losses)).forEach((p,i) => {
                const total = p.wins + p.losses;
                const wr = total>0 ? (p.wins*100/total).toFixed(1) : '0.0';
                const fi = p.faction==='Орден Света'?'🌝':(p.faction==='Культ Тьмы'?'🌚':'');
                html += `<tr data-index="${i+1}" data-name="${p.display}" data-class="${p.name}" data-wl="${total}" data-winrate="${wr}" data-streak="${p.best}" data-worst="${p.worst||0}" data-level="${p.level}" data-faction="${fi}"><td>${i+1}</td><td>${p.display}</td><td>${p.name}</td><td class="number">${p.wins}-${p.losses}</td><td class="number">${wr}%</td><td class="number">${p.best}</td><td class="number" style="color:var(--red);">${p.worst||0}</td><td class="number">${p.level}</td><td>${fi}</td></tr>`;
            });
            html += '</tbody></table></div></div></div>';

            document.getElementById('content').innerHTML = html;

            initSortableTable('classes-table', 'total', 'desc');
            initSortableTable('races-table', 'total', 'desc');
            initSortableTable('combos-table', 'winrate', 'desc');
            initSortableTable('rating-table', 'skill', 'desc');
            initSortableTable('shards-table', 'shards', 'desc');
            initSortableTable('champions-table', 'wins', 'desc');
            initPlayersTable();

            setTimeout(() => {
                const hash = window.location.hash.substring(1);
                const validTabs = ['tops', 'classes', 'races', 'combos', 'rating', 'shards', 'records', 'champions', 'titles', 'allplayers'];
                if (hash && validTabs.includes(hash)) switchTab(hash);
            }, 100);

            window.showPlayerProgress = function(nickname) {
                const container = document.getElementById('player-progress-result');
                if (!nickname) { container.innerHTML = '<span style="color:var(--text-muted);">Введите ник, чтобы увидеть прогресс</span>'; return; }
                const player = players.find(p => p.display.toLowerCase() === nickname.toLowerCase());
                if (!player) { container.innerHTML = '<span style="color:var(--red);">Игрок не найден</span>'; return; }
                const total = player.wins + player.losses;
                const winrate = total > 0 ? (player.wins * 100 / total) : 0;
                const faction = player.faction || '';
                const nextLevel = achievements.filter(a => a.type === 'level' && a.value > player.level).sort((a,b) => a.value - b.value)[0];
                const nextTournament = achievements.filter(a => a.type === 'tournament' && a.value > player.tournamentWins).sort((a,b) => a.value - b.value)[0];
                const nextWins = achievements.filter(a => a.type === 'wins' && a.value > player.wins).sort((a,b) => a.value - b.value)[0];
                const nextBest = achievements.filter(a => a.type === 'best' && a.value > player.best).sort((a,b) => a.value - b.value)[0];
                const nextFaction = achievements.filter(a => a.type === 'faction' && a.faction === faction && a.value > player.factionWins).sort((a,b) => a.value - b.value)[0];
                const nextWinrate = achievements.filter(a => a.type === 'winrate' && a.value > winrate && (!a.minFights || total >= a.minFights)).sort((a,b) => a.value - b.value)[0];
                let html = '';
                function bar(label, current, max, nextTitle){
                    const pct = Math.min(100, (current/max)*100);
                    const done = current >= max;
                    return `<div style="margin-bottom:16px;"><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>${label}</span><span style="color:var(--text-muted);font-size:0.7rem;">${current}/${max}</span></div><div style="background:var(--bg-card);height:6px;border-radius:3px;"><div style="width:${pct}%;background:${done?'var(--gold)':'var(--purple)'};height:6px;border-radius:3px;"></div></div><div style="margin-top:4px;color:var(--gold);font-size:0.7rem;">${nextTitle ? '⏩️ '+nextTitle.emoji+' '+nextTitle.name : '✅ Максимум!'}</div></div>`;
                }
                if(nextLevel) html += bar('📈 Уровень', player.level, nextLevel.value, nextLevel);
                if(nextTournament) html += bar('🏆 Турнирные победы', player.tournamentWins, nextTournament.value, nextTournament);
                if(nextWins) html += bar('⚔️ Всего побед', player.wins, nextWins.value, nextWins);
                if(nextBest) html += bar('🔥 Лучший стрик', player.best, nextBest.value, nextBest);
                if(nextFaction && faction){ const fi = faction === 'Орден Света' ? '🌝' : '🌚'; html += bar(`${fi} ${faction}`, player.factionWins, nextFaction.value, nextFaction); }
                if(nextWinrate) html += bar('📊 Винрейт', winrate.toFixed(1), nextWinrate.value, nextWinrate);
                if(html === '') html = '<span style="color:var(--gold);">🏆 Все титулы получены! Ты легенда!</span>';
                container.innerHTML = html;
            };
        }

        function initSortableTable(tableId, defaultSort, defaultDir) {
            setTimeout(() => {
                const table = document.getElementById(tableId); if (!table) return;
                const tbody = table.querySelector('tbody');
                const headers = table.querySelectorAll('.sortable-header');
                let currentSort = defaultSort, currentDir = defaultDir;
                function sortTable(sortBy){
                    const rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort((a,b) => {
                        let va = a.dataset[sortBy], vb = b.dataset[sortBy];
                        if (sortBy === 'name' || sortBy === 'class' || sortBy === 'faction') return currentDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                        va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
                        return currentDir === 'asc' ? va - vb : vb - va;
                    });
                    rows.forEach(row => tbody.appendChild(row));
                }
                headers.forEach(th => {
                    th.addEventListener('click', () => {
                        const sortBy = th.dataset.sort;
                        headers.forEach(h => h.classList.remove('asc','desc'));
                        if (currentSort === sortBy) currentDir = currentDir === 'asc' ? 'desc' : 'asc';
                        else { currentSort = sortBy; currentDir = 'desc'; }
                        th.classList.add(currentDir);
                        sortTable(currentSort);
                    });
                });
                const defaultHeader = table.querySelector(`[data-sort="${defaultSort}"]`);
                if (defaultHeader) { defaultHeader.classList.add(defaultDir); sortTable(defaultSort); }
            }, 200);
        }

        function initPlayersTable(){
            setTimeout(() => {
                const tbody = document.getElementById('players-tbody');
                const searchInput = document.getElementById('player-search');
                const clearBtn = document.getElementById('clear-search');
                const resultSpan = document.getElementById('search-result');
                const headers = document.querySelectorAll('#players-table .sortable-header');
                if (!tbody) return;
                let currentSort = 'wl', currentDir = 'desc';
                const allRows = Array.from(tbody.querySelectorAll('tr'));
                function filterAndSort(){
                    const searchText = searchInput?.value.toLowerCase() || '';
                    let filtered = allRows.filter(row => {
                        if (!searchText) return true;
                        const name = row.dataset.name?.toLowerCase() || '';
                        const cls = row.dataset.class?.toLowerCase() || '';
                        return name.includes(searchText) || cls.includes(searchText);
                    });
                    filtered.sort((a,b) => {
                        let va = a.dataset[currentSort], vb = b.dataset[currentSort];
                        if (currentSort === 'name' || currentSort === 'class' || currentSort === 'faction') return currentDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                        va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
                        return currentDir === 'asc' ? va - vb : vb - va;
                    });
                    filtered.forEach((row, idx) => { row.cells[0].textContent = idx + 1; });
                    tbody.innerHTML = '';
                    filtered.forEach(row => tbody.appendChild(row));
                    if (resultSpan) resultSpan.textContent = searchText ? `Найдено: ${filtered.length}` : '';
                    if (searchText){ tbody.querySelectorAll('tr').forEach(row => { const nc = row.cells[1], cc = row.cells[2]; if(nc) nc.innerHTML = nc.textContent.replace(new RegExp(`(${searchText})`,'gi'), '<span class="highlight">$1</span>'); if(cc) cc.innerHTML = cc.textContent.replace(new RegExp(`(${searchText})`,'gi'), '<span class="highlight">$1</span>'); }); }
                }
                headers.forEach(th => { th.addEventListener('click', () => { const sortBy = th.dataset.sort; headers.forEach(h => h.classList.remove('asc','desc')); if (currentSort === sortBy) currentDir = currentDir === 'asc' ? 'desc' : 'asc'; else { currentSort = sortBy; currentDir = 'desc'; } th.classList.add(currentDir); filterAndSort(); }); });
                if (searchInput) searchInput.addEventListener('input', filterAndSort);
                if (clearBtn) clearBtn.addEventListener('click', () => { searchInput.value = ''; filterAndSort(); });
                const wlHeader = document.querySelector('[data-sort="wl"]');
                if (wlHeader) { wlHeader.classList.add('desc'); filterAndSort(); }
            }, 200);
        }

        window.switchTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.textContent.toLowerCase().includes(tabName) || 
                    (tabName === 'tops' && btn.textContent.includes('Топы')) ||
                    (tabName === 'classes' && btn.textContent.includes('Классы')) ||
                    (tabName === 'races' && btn.textContent.includes('Расы')) ||
                    (tabName === 'combos' && btn.textContent.includes('Комбинации')) ||
                    (tabName === 'rating' && btn.textContent.includes('Рейтинг')) ||
                    (tabName === 'shards' && btn.textContent.includes('Осколки')) ||
                    (tabName === 'records' && btn.textContent.includes('Рекорды')) ||
                    (tabName === 'champions' && btn.textContent.includes('Чемпионы')) ||
                    (tabName === 'titles' && btn.textContent.includes('Титулы')) ||
                    (tabName === 'allplayers' && btn.textContent.includes('Игроки'))) {
                    btn.classList.add('active');
                }
            });
            history.replaceState(null, null, '#' + tabName);
        };
    </script>
</body>
</html>
