<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
body { 
    background: transparent; 
    color: #fff; 
    width: 500px; 
    height: 1200px; 
    overflow: hidden; 
}
#container { 
    width: 500px; 
    height: 1200px; 
    overflow: hidden; 
    position: relative; 
}
#scrollContent { 
    position: absolute; 
    width: 100%; 
    top: 0;
    left: 0;
}
.section { 
    background: rgba(20, 10, 30, 0.85);
    padding: 18px;
    margin-bottom: 20px;
    border: 1px solid rgba(159, 122, 234, 0.3);
    border-radius: 6px;
}
.section-title { 
    font-size: 20px; 
    font-weight: 700; 
    color: #fff; 
    margin-bottom: 15px; 
    padding-bottom: 8px; 
    border-bottom: 2px solid #9f7aea; 
    display: flex; 
    align-items: center; 
    gap: 8px;
    text-shadow: 0 0 8px rgba(159,122,234,0.6);
}
.stat-item, .player, .class-item { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px 15px; 
    margin: 0 0 4px 0; 
    background: rgba(0,0,0,0.3); 
    border: 1px solid rgba(159,122,234,0.2); 
    border-radius: 6px; 
    font-size: 22px; 
}
.player span:first-child, .class-item span:first-child,
.champion span:first-child, .stat-item span:first-child {
    display: flex;
    align-items: center;
    gap: 8px;
}
.champion { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px 15px; 
    margin: 0 0 4px 0; 
    background: rgba(159,122,234,0.15); 
    border: 1px solid #9f7aea; 
    border-radius: 6px; 
    font-size: 24px; 
    font-weight: 700; 
    color: #ffd966;
    box-shadow: 0 0 10px rgba(255,217,102,0.3);
}
.stats { 
    font-weight: 700; 
    color: #9f7aea; 
    background: rgba(0,0,0,0.3); 
    padding: 4px 12px; 
    border-radius: 20px; 
    font-size: 22px; 
    border: 1px solid rgba(159,122,234,0.3); 
}
.faction-battle {
    margin: 15px 0;
    background: rgba(0,0,0,0.5);
    border-radius: 12px;
    overflow: hidden;
}
.battle-bar {
    display: flex;
    height: 44px;
    font-weight: bold;
    font-size: 18px;
}
.bar-light {
    background: linear-gradient(90deg, #ffd966, #ffb347);
    color: #000;
    text-align: right;
    padding-right: 12px;
    line-height: 44px;
    transition: width 0.6s ease-out;
    font-weight: 800;
}
.bar-dark {
    background: linear-gradient(90deg, #9b59b6, #6c3483);
    color: #fff;
    text-align: left;
    padding-left: 12px;
    line-height: 44px;
    transition: width 0.6s ease-out;
    font-weight: 800;
}
.faction-row {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}
.faction-card {
    flex: 1;
    text-align: center;
    padding: 20px 12px;
    border-radius: 12px;
    background: rgba(0,0,0,0.6);
}
.faction-card.light {
    border: 2px solid rgba(255,215,0,0.8);
    background: linear-gradient(145deg, rgba(255,215,0,0.25), rgba(255,200,0,0.1));
    box-shadow: 0 0 20px rgba(255,215,0,0.3);
}
.faction-card.dark {
    border: 2px solid rgba(156,0,156,0.9);
    background: linear-gradient(145deg, rgba(128,0,128,0.3), rgba(75,0,130,0.15));
    box-shadow: 0 0 20px rgba(128,0,128,0.3);
}
.faction-icon {
    font-size: 48px;
    margin-bottom: 12px;
}
.faction-name {
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    margin-bottom: 18px;
}
.light .faction-name { color: #ffd966; text-shadow: 0 0 12px rgba(255,217,102,0.8); }
.dark .faction-name { color: #e9b0ff; text-shadow: 0 0 12px rgba(233,176,255,0.8); }
.faction-stat {
    font-size: 20px;
    padding: 8px 0;
    color: #fff;
    font-weight: 700;
    text-align: center;
}
.faction-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #9f7aea, transparent);
    margin: 12px 0;
    opacity: 0.6;
}
.leader-title {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #9f7aea;
    margin-bottom: 8px;
    font-weight: 700;
}
.leader-name {
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 6px;
    color: #fff;
}
.leader-record {
    font-size: 16px;
    font-weight: 700;
    color: #e9b0ff;
}
.empty-message {
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 18px;
}
@keyframes pulse {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
}
.pulse-animation {
    animation: pulse 0.5s ease-out;
}
</style>
</head>
<body>
<div id="container">
    <div id="scrollContent">Загрузка...</div>
</div>

<script>
let container = document.getElementById('container');
let scrollEl = document.getElementById('scrollContent');
let y = 0;
const speed = 0.6;
let prevLightLeader = '';
let prevDarkLeader = '';

// ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
function getRaceEmoji(race) {
    const emojiMap = {
        'Человек': '🧑', 'Орк': '👹', 'Дворф': '🧔', 'Эльф': '🧝', 'Нежить': '💀',
        'Тифлинг': '😈', 'Табакси': '🐱', 'Фея': '🧚', 'Драконорожденный': '🐉', 'Гном': '🪨'
    };
    return emojiMap[race] || '⚔️';
}

function getPlayerDisplay(p, type = 'full') {
    if (type === 'none') return p.display;
    return `${p.emoji || '⚔️'} ${p.display}`;
}

function renderTop(title, items, getLabel, getValue) {
    if (!items.length) return '';
    return `
        <div class="section">
            <div class="section-title">${title}</div>
            ${items.map(item => `
                <div class="player">
                    <span>${getLabel(item)}</span>
                    <span class="stats">${getValue(item)}</span>
                </div>
            `).join('')}
        </div>
    `;
}

// ===== ОСНОВНАЯ ФУНКЦИЯ =====
async function loadData() {
    try {
        const res = await fetch('stats_data.json?' + Date.now());
        const text = await res.text();
        if (!text || text.length < 5) return;
        
        let data;
        try { data = JSON.parse(text); } catch { return; }
        const players = data.players;
        let html = '';

        // ===== ЧЕМПИОН =====
        const champ = players.find(p => p.champion);
        if (champ) {
            const total = champ.wins + champ.losses;
            const pct = total ? Math.round(champ.wins * 100 / total) : 0;
            html += `
                <div class="section">
                    <div class="section-title">👑 ХРАНИТЕЛЬ РАСКОЛА</div>
                    <div class="champion">
                        <span>${getPlayerDisplay(champ)}</span>
                        <span class="stats">${champ.wins}-${champ.losses} (${pct}%)</span>
                    </div>
                </div>
            `;
        }

        // ===== ФРАКЦИИ =====
        let light = { wins: 0, totalFights: 0, members: 0, leader: null };
        let dark = { wins: 0, totalFights: 0, members: 0, leader: null };

        players.forEach(p => {
            if (p.faction === "Орден Света") {
                light.members++;
                light.wins += p.factionWins || 0;
                light.totalFights += (p.wins || 0) + (p.losses || 0);
                if (!light.leader || (p.factionWins || 0) > (light.leader.factionWins || 0)) light.leader = p;
            } else if (p.faction === "Культ Тьмы") {
                dark.members++;
                dark.wins += p.factionWins || 0;
                dark.totalFights += (p.wins || 0) + (p.losses || 0);
                if (!dark.leader || (p.factionWins || 0) > (dark.leader.factionWins || 0)) dark.leader = p;
            }
        });

        const totalFactionWins = light.wins + dark.wins;
        const lightPercent = totalFactionWins > 0 ? Math.round(light.wins * 100 / totalFactionWins) : 50;
        const darkPercent = 100 - lightPercent;
        const lightWr = light.totalFights > 0 ? Math.round(light.wins * 100 / light.totalFights) : 0;
        const darkWr = dark.totalFights > 0 ? Math.round(dark.wins * 100 / dark.totalFights) : 0;

        if (prevLightLeader && prevLightLeader !== (light.leader?.display || '')) {
            setTimeout(() => document.querySelector('.bar-light')?.classList.add('pulse-animation'), 50);
        }
        if (prevDarkLeader && prevDarkLeader !== (dark.leader?.display || '')) {
            setTimeout(() => document.querySelector('.bar-dark')?.classList.add('pulse-animation'), 50);
        }
        prevLightLeader = light.leader?.display || '';
        prevDarkLeader = dark.leader?.display || '';

        html += `<div class="section">
            <div class="section-title">⚔️ ВЕЧНОЕ ПРОТИВОСТОЯНИЕ</div>
            <div class="faction-battle">
                <div class="battle-bar">
                    <div class="bar-light" style="width: ${lightPercent}%">${lightPercent}%</div>
                    <div class="bar-dark" style="width: ${darkPercent}%">${darkPercent}%</div>
                </div>
            </div>
            <div class="faction-row">
                <div class="faction-card light">
                    <div class="faction-icon">🌝</div>
                    <div class="faction-name">ОРДЕН СВЕТА</div>
                    <div class="faction-stat">👥 ${light.members} воинов</div>
                    <div class="faction-stat">⚔️ ${light.wins} побед</div>
                    <div class="faction-stat">📈 ${lightWr}% винрейт</div>
                    <div class="faction-stat">⚔️ ${light.totalFights} боёв</div>
                    <div class="faction-divider"></div>
                    <div class="leader-title">ЛИДЕР</div>
                    <div class="leader-name">${light.leader?.display || '—'}</div>
                    <div class="leader-record">${light.leader?.factionWins || 0} побед</div>
                </div>
                <div class="faction-card dark">
                    <div class="faction-icon">🌚</div>
                    <div class="faction-name">КУЛЬТ ТЬМЫ</div>
                    <div class="faction-stat">👥 ${dark.members} воинов</div>
                    <div class="faction-stat">⚔️ ${dark.wins} побед</div>
                    <div class="faction-stat">📈 ${darkWr}% винрейт</div>
                    <div class="faction-stat">⚔️ ${dark.totalFights} боёв</div>
                    <div class="faction-divider"></div>
                    <div class="leader-title">ПОВЕЛИТЕЛЬ</div>
                    <div class="leader-name">${dark.leader?.display || '—'}</div>
                    <div class="leader-record">${dark.leader?.factionWins || 0} побед</div>
                </div>
            </div>
        </div>`;

        // ===== СЕЗОННЫЙ ТОП-5 =====
        if (data.seasonTop?.length) {
            html += renderTop('🏆 СЕЗОННЫЙ РЕЙТИНГ', data.seasonTop,
                p => getPlayerDisplay(p), p => `${p.skill} pts`);
        }

        // ===== ТОП-5 ПО ЧЕМПИОНСТВАМ =====
        const topChampions = [...players]
            .filter(p => p.tournamentWins > 0)
            .sort((a, b) => b.tournamentWins - a.tournamentWins)
            .slice(0, 5);
        html += renderTop('👑 ЧЕМПИОНЫ', topChampions,
            p => getPlayerDisplay(p), p => `👑 x${p.tournamentWins}`);

        // ===== ТОП-5 ПО ВИНРЕЙТУ =====
        const topWR = [...players]
            .filter(p => (p.wins + p.losses) >= 20)
            .map(p => ({ ...p, score: (p.wins / (p.wins + p.losses)) * Math.log2(p.wins + p.losses + 1) }))
            .sort((a, b) => b.score - a.score)
            .slice(0, 5);
        html += renderTop('🏆 ТОП ВИНРЕЙТ', topWR,
            p => getPlayerDisplay(p), p => {
                const total = p.wins + p.losses;
                const pct = total ? Math.round(p.wins * 100 / total) : 0;
                return `${p.wins}-${p.losses} (${pct}%)`;
            });

        // ===== ТОП-5 ПО УРОВНЮ =====
        const topLevel = [...players]
            .filter(p => p.level > 0)
            .sort((a, b) => b.level - a.level)
            .slice(0, 5);
        html += renderTop('📈 МАСТЕРА УРОВНЯ', topLevel,
            p => getPlayerDisplay(p), p => `${p.level} уровень`);

        // ===== ТОП-5 ПО ОСКОЛКАМ =====
        const topShards = [...players]
            .filter(p => p.shards > 0)
            .sort((a, b) => b.shards - a.shards)
            .slice(0, 5);
        html += renderTop('💎 КОЛЛЕКЦИОНЕРЫ', topShards,
            p => getPlayerDisplay(p), p => `${p.shards}`);

        // ===== ГОРЯЧИЕ ИГРОКИ =====
        const hot = [...players]
            .filter(p => (p.wins + p.losses) >= 10)
            .sort((a, b) => b.best - a.best)
            .slice(0, 5);
        html += renderTop('🔥 ГОРЯЧИЕ ИГРОКИ', hot,
            p => p.display, p => `🔥 x${p.best}`);

        // ===== НЕУДАЧНИКИ ДНЯ =====
        const cursed = [...players]
            .filter(p => (p.wins + p.losses) >= 10)
            .sort((a, b) => (b.losses / (b.wins + 1)) - (a.losses / (a.wins + 1)))
            .slice(0, 5);
        html += renderTop('💀 НЕУДАЧНИКИ ДНЯ', cursed,
            p => p.display, p => `${p.wins}-${p.losses}`);

        // ===== ЛУДОМАНЫ =====
        const grinders = [...players]
            .sort((a, b) => (b.wins + b.losses) - (a.wins + a.losses))
            .slice(0, 5);
        html += renderTop('🎰 ЛУДОМАНЫ', grinders,
            p => p.display, p => `${p.wins + p.losses} боёв`);

        // ===== РЕЙТИНГ КЛАССОВ =====
        const classEmojiMap = {
            'Чародей': '🔮', 'Плут': '🗡️', 'Колдун': '👁️', 'Некромант': '🦴',
            'Жрец': '✝️', 'Следопыт': '🏹', 'Волшебница': '✨', 'Бард': '🎸',
            'Монах': '🥋', 'Паладин': '🛡️', 'Воин': '⚔️', 'Друид': '🌿',
            'Варвар': '🪓', 'Изобретатель': '⚙️'
        };
        const cls = {};
        players.forEach(p => {
            const total = p.wins + p.losses;
            if (total >= 20 && p.name?.trim()) {
                let className = p.name.split('-')[1] || p.name;
                if (!cls[className]) cls[className] = { w: 0, l: 0, e: classEmojiMap[className] || '⚔️', n: className };
                cls[className].w += p.wins;
                cls[className].l += p.losses;
            }
        });
        const topCls = Object.values(cls)
            .sort((a, b) => (b.w / (b.w + b.l)) - (a.w / (a.w + a.l)))
            .slice(0, 5);
        if (topCls.length) {
            html += `<div class="section"><div class="section-title">📊 РЕЙТИНГ КЛАССОВ</div>`;
            topCls.forEach(c => {
                const total = c.w + c.l;
                const pct = total ? Math.round(c.w * 100 / total) : 0;
                html += `<div class="class-item">
                    <span>${c.e} ${c.n}</span>
                    <span class="stats">${c.w}-${c.l} (${pct}%)</span>
                </div>`;
            });
            html += `</div>`;
        }

        // ===== ВИНРЕЙТ РАС =====
        const raceStats = {};
        players.forEach(p => {
            if (!p.name?.trim()) return;
            const race = p.name.split('-')[0];
            if (!race) return;
            if (!raceStats[race]) raceStats[race] = { wins: 0, losses: 0, emoji: getRaceEmoji(race) };
            raceStats[race].wins += p.wins;
            raceStats[race].losses += p.losses;
        });
        const sortedRaces = Object.entries(raceStats)
            .map(([name, data]) => ({
                name, emoji: data.emoji, wins: data.wins, losses: data.losses,
                total: data.wins + data.losses,
                wr: data.wins + data.losses > 0 ? Math.round(data.wins * 100 / (data.wins + data.losses)) : 0
            }))
            .filter(r => r.total >= 10)
            .sort((a, b) => b.wr - a.wr);
        if (sortedRaces.length) {
            html += `<div class="section"><div class="section-title">📊 ВИНРЕЙТ РАС</div>`;
            sortedRaces.forEach(r => {
                html += `<div class="player">
                    <span>${r.emoji} ${r.name}</span>
                    <span class="stats">${r.wins}-${r.losses} (${r.wr}%)</span>
                </div>`;
            });
            html += `</div>`;
        }

        // ===== ОБЩАЯ СТАТИСТИКА =====
        const totalPlayers = players.length;
        const totalBattles = players.reduce((sum, p) => sum + p.wins + p.losses, 0);
        const totalWinsAll = players.reduce((sum, p) => sum + p.wins, 0);
        const overallWinrate = totalBattles > 0 ? Math.round(totalWinsAll * 100 / totalBattles) : 0;
        const totalShards = players.reduce((sum, p) => sum + (p.shards || 0), 0);
        const best = players.reduce((b, p) => p.best > b.best ? p : b, { best: 0 });
        const maxLevel = players.reduce((m, p) => p.level > m.level ? p : m, { level: 0 });

        html += `<div class="section">
            <div class="section-title">📈 ОБЩАЯ СТАТИСТИКА</div>
            <div class="stat-item"><span>👥 Всего игроков</span><span class="stats">${totalPlayers}</span></div>
            <div class="stat-item"><span>⚔️ Всего боёв</span><span class="stats">${totalBattles}</span></div>
            <div class="stat-item"><span>🏅 Всего побед</span><span class="stats">${totalWinsAll}</span></div>
            <div class="stat-item"><span>💎 Всего опыта</span><span class="stats">${totalShards}</span></div>
            <div class="stat-item"><span>📊 Общий винрейт</span><span class="stats">${overallWinrate}%</span></div>
            ${best.best > 0 ? `<div class="stat-item"><span>🔥 Лучшая серия</span><span class="stats">${best.display} [${best.best}]</span></div>` : ''}
            ${maxLevel.level > 0 ? `<div class="stat-item"><span>🏔 Макс уровень</span><span class="stats">${maxLevel.display} [${maxLevel.level}]</span></div>` : ''}
        </div>`;

        const prevY = y;
        scrollEl.innerHTML = html + html;
        y = prevY;
        setTimeout(() => document.querySelectorAll('.pulse-animation').forEach(el => el.classList.remove('pulse-animation')), 600);

    } catch (e) {
        scrollEl.innerHTML = '<div class="section">❌ Ошибка загрузки</div>';
    }
}

function scroll() {
    y -= speed;
    const half = scrollEl.scrollHeight / 2;
    if (y <= -half) y += half;
    scrollEl.style.transform = `translateY(${y}px)`;
    requestAnimationFrame(scroll);
}

loadData();
setInterval(loadData, 30000);
scroll();
</script>
</body>
</html>
