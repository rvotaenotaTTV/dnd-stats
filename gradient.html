<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Градиент баланса v2</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0b0f14 0%, #0d1117 40%, #0a0d12 100%);
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
        }
        h1 { color: #ffd700; text-align: center; margin: 15px 0 10px; font-size: 2.2em; font-weight: 700; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 25px; font-size: 14px; }
        
        .nav-wrapper { margin-bottom: 30px; border-bottom: 1px solid #30363d; }
        .nav-toggle {
            display: none; width: 100%; padding: 12px 20px; background: #21262d;
            border: 1px solid #30363d; border-radius: 25px; color: #ffd700;
            font-size: 16px; font-weight: bold; cursor: pointer; text-align: left;
        }
        .page-nav { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
        .page-nav a {
            color: #8b949e; text-decoration: none; padding: 12px 20px;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
            white-space: nowrap; border-bottom: 3px solid transparent;
        }
        .page-nav a:hover { color: #ffd700; border-bottom-color: #ffd70080; }
        .page-nav a.active { color: #ffd700; font-weight: bold; border-bottom-color: #ffd700; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        .class-selector {
            background: #161b22; border-radius: 16px; padding: 20px;
            border: 1px solid #30363d; margin-bottom: 25px;
        }
        
        .selector-row {
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .class-select, .race-select {
            background: #21262d; border: 1px solid #30363d; color: white;
            padding: 12px 20px; border-radius: 12px; font-size: 16px;
            cursor: pointer;
        }
        .class-select { min-width: 250px; }
        .race-select { min-width: 200px; }
        
        .btn {
            background: #21262d; border: 1px solid #ffd700; color: #ffd700;
            padding: 12px 30px; border-radius: 25px; cursor: pointer;
            font-size: 16px; font-weight: bold; transition: all 0.2s;
        }
        .btn:hover { background: #ffd700; color: #0d1117; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .stats-panel {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: #21262d; border-radius: 12px; padding: 15px;
            text-align: center; border: 1px solid #30363d;
        }
        
        .stat-emoji { font-size: 20px; margin-bottom: 5px; }
        .stat-name { color: #8b949e; font-size: 12px; margin-bottom: 8px; }
        .stat-value { color: #ffd700; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        
        .stat-input {
            width: 70px; background: #0d1117; border: 1px solid #30363d;
            color: #ffd700; font-size: 14px; font-weight: bold; text-align: center;
            padding: 5px; border-radius: 6px; margin: 0 auto;
        }
        
        .result-panel {
            background: linear-gradient(145deg, #1a1f26, #161b22);
            border-radius: 20px; padding: 30px; border: 1px solid #30363d;
            text-align: center; margin-top: 25px;
        }
        
        .winrate-display {
            display: flex; gap: 30px; justify-content: center; align-items: center;
            flex-wrap: wrap;
        }
        
        .winrate-box {
            text-align: center; padding: 20px 30px; background: #21262d;
            border-radius: 16px; border: 1px solid #30363d;
        }
        
        .winrate-label { color: #8b949e; font-size: 14px; margin-bottom: 10px; }
        .winrate-value { font-size: 42px; font-weight: bold; color: #ffd700; }
        .winrate-arrow { font-size: 32px; color: #ffd700; }
        
        .diff-badge {
            display: inline-block; padding: 6px 16px; border-radius: 30px;
            font-size: 16px; font-weight: bold; margin-top: 10px;
        }
        .diff-positive { background: #1a4d1a; color: #90ee90; }
        .diff-negative { background: #4d1a1a; color: #ff9090; }
        .diff-neutral { background: #4d4d1a; color: #ffff90; }
        
        .progress { color: #ffd700; font-size: 14px; margin-left: 15px; }
        .sim-details { margin-top: 20px; color: #8b949e; font-size: 13px; }
        
        .reset-btn {
            background: transparent; border: 1px solid #30363d; color: #8b949e;
            padding: 8px 16px; border-radius: 20px; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .reset-btn:hover { border-color: #ffd700; color: #ffd700; }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.6em; margin-top: 45px; }
            .nav-wrapper { border-bottom: none; }
            .nav-toggle { display: block; }
            .page-nav { display: none; flex-direction: column; margin-top: 10px; }
            .page-nav.show { display: flex; }
            .page-nav a { text-align: center; padding: 10px; background: #21262d; border-radius: 20px; }
            .stats-panel { grid-template-columns: repeat(2, 1fr); }
            .winrate-value { font-size: 32px; }
            .winrate-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <h1>📈 ГРАДИЕНТ БАЛАНСА v2</h1>
    <div class="subtitle">Честная симуляция боёв + расы + калибровка по реальным данным</div>
    
    <div class="nav-wrapper">
        <button class="nav-toggle">☰ Меню</button>
        <div class="page-nav">
            <a href="index.html">📊 Статистика</a>
            <a href="balance.html">⚖️ Баланс</a>
            <a href="guide.html">⚔️ Гайд</a>
            <a href="lore.html">📜 Лор Этерниса</a>
            <a href="hall.html">🏆 Зал Славы</a>
            <a href="logs.html">📜 Логи</a>
            <a href="simulator.html">🧪 Симулятор</a>
            <a href="calc.html">🎲 Калькулятор</a>
            <a href="gradient.html" class="active">📈 Градиент</a>
        </div>
    </div>
    
    <div class="container">
        <div class="class-selector">
            <div class="selector-row">
                <select id="classSelect" class="class-select"></select>
                <select id="raceSelect" class="race-select"></select>
                <button class="btn" id="simulateBtn" onclick="runGradient()">🔮 ПРОГНОЗ</button>
                <button class="reset-btn" onclick="resetToOriginal()">🔄 Сбросить</button>
                <span class="progress" id="progress"></span>
            </div>
            
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-emoji">❤️</div>
                    <div class="stat-name">HP</div>
                    <div class="stat-value" id="hpDisplay">24</div>
                    <input type="number" id="hpInput" class="stat-input" min="10" max="50" value="24">
                </div>
                <div class="stat-card">
                    <div class="stat-emoji">⚔️</div>
                    <div class="stat-name">ATK</div>
                    <div class="stat-value" id="atkDisplay">6</div>
                    <input type="number" id="atkInput" class="stat-input" min="0" max="15" value="6">
                </div>
                <div class="stat-card">
                    <div class="stat-emoji">🛡️</div>
                    <div class="stat-name">DEF</div>
                    <div class="stat-value" id="defDisplay">0</div>
                    <input type="number" id="defInput" class="stat-input" min="0" max="5" value="0">
                </div>
                <div class="stat-card">
                    <div class="stat-emoji">⬇️</div>
                    <div class="stat-name">MIN</div>
                    <div class="stat-value" id="minDisplay">5</div>
                    <input type="number" id="minInput" class="stat-input" min="1" max="15" value="5">
                </div>
                <div class="stat-card">
                    <div class="stat-emoji">⬆️</div>
                    <div class="stat-name">MAX</div>
                    <div class="stat-value" id="maxDisplay">10</div>
                    <input type="number" id="maxInput" class="stat-input" min="2" max="20" value="10">
                </div>
            </div>
        </div>
        
        <div class="result-panel" id="resultCard" style="display:none;">
            <div class="winrate-display">
                <div class="winrate-box">
                    <div class="winrate-label">Реальный (база)</div>
                    <div class="winrate-value" id="currentWinrate">46.5%</div>
                </div>
                <div class="winrate-arrow">→</div>
                <div class="winrate-box" style="border-color:#ffd700;">
                    <div class="winrate-label">Прогноз</div>
                    <div class="winrate-value" id="predictedWinrate">—</div>
                    <div id="winrateDiff" class="diff-badge diff-neutral">—</div>
                </div>
            </div>
            <div class="sim-details" id="simulationDetails"></div>
        </div>
    </div>

    <script>
        const navToggle = document.querySelector('.nav-toggle');
        const pageNav = document.querySelector('.page-nav');
        navToggle.addEventListener('click', () => {
            pageNav.classList.toggle('show');
            navToggle.textContent = pageNav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
        });

        const DATA_URL = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/data.json';
        const STATS_URL = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/stats_data.json';
        
        let CONFIG = {};
        let classesData = [];
        let racesData = [];
        let players = [];
        let classBuilds = {};
        let originalStats = {};
        let currentClass = 'Некромант';
        let currentRace = '';
        let isRunning = false;

        const REAL_WINRATES = {
            'Варвар': 59.2, 'Следопыт': 56.9, 'Бард': 55.1, 'Паладин': 54.2,
            'Колдун': 53.3, 'Чародей': 53.0, 'Изобретатель': 53.0, 'Воин': 51.6,
            'Жрец': 50.0, 'Друид': 50.0, 'Плут': 49.5, 'Некромант': 46.5,
            'Монах': 45.8, 'Волшебница': 41.5
        };

        async function loadData() {
            const [dataResp, statsResp] = await Promise.all([
                fetch(DATA_URL),
                fetch(STATS_URL)
            ]);
            
            const data = await dataResp.json();
            const stats = await statsResp.json();
            
            CONFIG = data.config || { 
                defReduction: 0.05, baseAC: 10, critMultiplier: 2,
                maxRounds: 20, blockThreshold: 4
            };
            classesData = data.classes;
            racesData = data.races;
            players = stats.players.filter(p => p.name && p.name !== 'Unknown');
            
            // Группируем билды
            classBuilds = {};
            players.forEach(p => {
                const parts = p.name.split('-');
                const className = parts[1] || parts[0];
                if (!classBuilds[className]) classBuilds[className] = [];
                classBuilds[className].push({
                    race: parts[0],
                    hp: p.Hp, atk: p.Atk, def: p.Def, min: p.Min, max: p.Max
                });
            });
            
            // Заполняем селекты
            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '';
            classesData.sort((a,b) => a.Name.localeCompare(b.Name)).forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.Name;
                option.textContent = `${cls.Emoji} ${cls.Name}`;
                classSelect.appendChild(option);
            });
            
            const raceSelect = document.getElementById('raceSelect');
            raceSelect.innerHTML = '<option value="">🚫 Без расы (голый класс)</option>';
            racesData.forEach(r => {
                const option = document.createElement('option');
                option.value = r.Name;
                option.textContent = `${r.Emoji} ${r.Name}`;
                raceSelect.appendChild(option);
            });
            
            classSelect.value = currentClass;
            classSelect.addEventListener('change', onClassChange);
            raceSelect.addEventListener('change', onRaceChange);
            
            // Установка оптимальной расы по умолчанию
            setOptimalRace(currentClass);
            loadClassStats();
        }

        function setOptimalRace(className) {
            const optimalRaces = {
                'Варвар': 'Орк', 'Следопыт': 'Эльф', 'Бард': 'Человек',
                'Паладин': 'Дворф', 'Колдун': 'Нежить', 'Чародей': 'Нежить',
                'Изобретатель': 'Эльф', 'Воин': 'Дворф', 'Жрец': 'Человек',
                'Друид': 'Эльф', 'Плут': 'Орк', 'Некромант': 'Дворф',
                'Монах': 'Человек', 'Волшебница': 'Эльф'
            };
            currentRace = optimalRaces[className] || '';
            document.getElementById('raceSelect').value = currentRace;
        }

        function onClassChange() {
            currentClass = document.getElementById('classSelect').value;
            setOptimalRace(currentClass);
            loadClassStats();
        }

        function onRaceChange() {
            currentRace = document.getElementById('raceSelect').value;
            loadClassStats();
        }

        function loadClassStats() {
            const cls = classesData.find(c => c.Name === currentClass);
            if (!cls) return;
            
            const race = currentRace ? racesData.find(r => r.Name === currentRace) : null;
            
            originalStats = {
                hp: cls.Hp + (race?.BonusHp || 0),
                atk: cls.Atk + (race?.BonusAtk || 0),
                def: cls.Def + (race?.BonusDef || 0),
                min: cls.Min + (race?.BonusMin || 0),
                max: cls.Max + (race?.BonusMax || 0)
            };
            
            document.getElementById('hpDisplay').textContent = originalStats.hp;
            document.getElementById('atkDisplay').textContent = originalStats.atk;
            document.getElementById('defDisplay').textContent = originalStats.def;
            document.getElementById('minDisplay').textContent = originalStats.min;
            document.getElementById('maxDisplay').textContent = originalStats.max;
            
            document.getElementById('hpInput').value = originalStats.hp;
            document.getElementById('atkInput').value = originalStats.atk;
            document.getElementById('defInput').value = originalStats.def;
            document.getElementById('minInput').value = originalStats.min;
            document.getElementById('maxInput').value = originalStats.max;
            
            document.getElementById('currentWinrate').textContent = (REAL_WINRATES[currentClass] || 50).toFixed(1) + '%';
        }

        function resetToOriginal() {
            loadClassStats();
        }
        window.resetToOriginal = resetToOriginal;

        function getStats(className, useOriginal = true) {
            if (className === currentClass && !useOriginal) {
                return {
                    hp: parseInt(document.getElementById('hpInput').value) || 20,
                    atk: parseInt(document.getElementById('atkInput').value) || 5,
                    def: parseInt(document.getElementById('defInput').value) || 0,
                    min: parseInt(document.getElementById('minInput').value) || 4,
                    max: parseInt(document.getElementById('maxInput').value) || 10
                };
            }
            
            // Для других классов берём СРЕДНИЙ БИЛД из реальных данных
            const builds = classBuilds[className];
            if (!builds || builds.length === 0) {
                const cls = classesData.find(c => c.Name === className);
                if (!cls) return null;
                return { hp: cls.Hp, atk: cls.Atk, def: cls.Def, min: cls.Min, max: cls.Max };
            }
            
            // Средний билд
            const sum = builds.reduce((acc, b) => {
                acc.hp += b.hp; acc.atk += b.atk; acc.def += b.def;
                acc.min += b.min; acc.max += b.max;
                return acc;
            }, { hp: 0, atk: 0, def: 0, min: 0, max: 0 });
            
            const n = builds.length;
            return {
                hp: Math.round(sum.hp / n),
                atk: Math.round(sum.atk / n * 10) / 10,
                def: Math.round(sum.def / n * 10) / 10,
                min: Math.round(sum.min / n),
                max: Math.round(sum.max / n)
            };
        }

        function simulateSingleFight(s1, s2) {
            const rnd = () => Math.floor(Math.random() * 20) + 1;
            const d3 = () => Math.floor(Math.random() * 3);
            
            const init1 = rnd() + Math.floor(s1.atk) + d3();
            const init2 = rnd() + Math.floor(s2.atk) + d3();
            const first = init1 !== init2 ? init1 > init2 : Math.random() < 0.5;
            
            let hp1 = s1.hp, hp2 = s2.hp;
            let rounds = 0;
            
            while (hp1 > 0 && hp2 > 0 && rounds < CONFIG.maxRounds) {
                rounds++;
                
                if (first) {
                    const r1 = rnd();
                    if (r1 !== 1 && r1 + s1.atk >= CONFIG.baseAC + s2.def) {
                        let d = Math.floor(Math.random() * (s1.max - s1.min + 1)) + s1.min;
                        if (r1 === 20) d += Math.floor(Math.random() * (s1.max - s1.min + 1)) + s1.min;
                        d = Math.max(1, Math.round(d * (1 - s2.def * CONFIG.defReduction)));
                        hp2 = Math.max(0, hp2 - d);
                    }
                    if (hp2 <= 0) break;
                    
                    const r2 = rnd();
                    if (r2 !== 1 && r2 + s2.atk >= CONFIG.baseAC + s1.def) {
                        let d = Math.floor(Math.random() * (s2.max - s2.min + 1)) + s2.min;
                        if (r2 === 20) d += Math.floor(Math.random() * (s2.max - s2.min + 1)) + s2.min;
                        d = Math.max(1, Math.round(d * (1 - s1.def * CONFIG.defReduction)));
                        hp1 = Math.max(0, hp1 - d);
                    }
                } else {
                    const r2 = rnd();
                    if (r2 !== 1 && r2 + s2.atk >= CONFIG.baseAC + s1.def) {
                        let d = Math.floor(Math.random() * (s2.max - s2.min + 1)) + s2.min;
                        if (r2 === 20) d += Math.floor(Math.random() * (s2.max - s2.min + 1)) + s2.min;
                        d = Math.max(1, Math.round(d * (1 - s1.def * CONFIG.defReduction)));
                        hp1 = Math.max(0, hp1 - d);
                    }
                    if (hp1 <= 0) break;
                    
                    const r1 = rnd();
                    if (r1 !== 1 && r1 + s1.atk >= CONFIG.baseAC + s2.def) {
                        let d = Math.floor(Math.random() * (s1.max - s1.min + 1)) + s1.min;
                        if (r1 === 20) d += Math.floor(Math.random() * (s1.max - s1.min + 1)) + s1.min;
                        d = Math.max(1, Math.round(d * (1 - s2.def * CONFIG.defReduction)));
                        hp2 = Math.max(0, hp2 - d);
                    }
                }
            }
            
            return hp1 > hp2 ? 1 : 0;
        }

async function runGradient() {
    if (isRunning) return;
    isRunning = true;
    
    const btn = document.getElementById('simulateBtn');
    const progress = document.getElementById('progress');
    btn.disabled = true;
    
    if (classesData.length === 0) {
        progress.textContent = 'Загрузка данных...';
        await loadData();
    }
    
    const fightsPerClass = 10000;
    const classes = classesData.map(c => c.Name);
    const n = classes.length;
    
    // ТЕКУЩИЕ СТАТЫ — берём из originalStats
    const currentStats = { ...originalStats };
    
    // НОВЫЕ СТАТЫ — из инпутов
    const newStats = {
        hp: parseInt(document.getElementById('hpInput').value) || originalStats.hp,
        atk: parseInt(document.getElementById('atkInput').value) || originalStats.atk,
        def: parseInt(document.getElementById('defInput').value) || originalStats.def,
        min: parseInt(document.getElementById('minInput').value) || originalStats.min,
        max: parseInt(document.getElementById('maxInput').value) || originalStats.max
    };
    
    progress.textContent = 'Симуляция с текущими статами...';
    
    let currentWins = 0;
    for (const otherClass of classes) {
        if (otherClass === currentClass) continue;
        
        const otherCls = classesData.find(c => c.Name === otherClass);
        if (!otherCls) continue;
        const otherStats = {
            hp: otherCls.Hp, atk: otherCls.Atk, def: otherCls.Def,
            min: otherCls.Min, max: otherCls.Max
        };
        
        for (let i = 0; i < fightsPerClass; i++) {
            currentWins += simulateSingleFight(currentStats, otherStats);
        }
        await new Promise(r => setTimeout(r, 5));
    }
    
    const totalFights = (n - 1) * fightsPerClass;
    const simulatedCurrent = (currentWins / totalFights) * 100;
    
    progress.textContent = 'Симуляция с новыми статами...';
    
    let newWins = 0;
    for (const otherClass of classes) {
        if (otherClass === currentClass) continue;
        
        const otherCls = classesData.find(c => c.Name === otherClass);
        if (!otherCls) continue;
        const otherStats = {
            hp: otherCls.Hp, atk: otherCls.Atk, def: otherCls.Def,
            min: otherCls.Min, max: otherCls.Max
        };
        
        for (let i = 0; i < fightsPerClass; i++) {
            newWins += simulateSingleFight(newStats, otherStats);
        }
        await new Promise(r => setTimeout(r, 5));
    }
    
    const simulatedNew = (newWins / totalFights) * 100;
    
    const realCurrent = REAL_WINRATES[currentClass] || 50;
    
    // Защита от деления на ноль
    let predictedReal = realCurrent;
    let calibrationCoef = 1.0;
    
    if (simulatedCurrent > 0) {
        calibrationCoef = realCurrent / simulatedCurrent;
        predictedReal = simulatedNew * calibrationCoef;
    } else {
        // Если симуляция сломалась — просто показываем симулированный новый
        predictedReal = simulatedNew;
    }
    
    const diff = predictedReal - realCurrent;
    
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('currentWinrate').textContent = realCurrent.toFixed(1) + '%';
    document.getElementById('predictedWinrate').textContent = predictedReal.toFixed(1) + '%';
    
    const diffEl = document.getElementById('winrateDiff');
    const sign = diff >= 0 ? '+' : '';
    diffEl.textContent = `${sign}${diff.toFixed(1)}%`;
    diffEl.className = 'diff-badge ' + 
        (diff > 0.5 ? 'diff-positive' : (diff < -0.5 ? 'diff-negative' : 'diff-neutral'));
    
    document.getElementById('simulationDetails').innerHTML = `
        Симулированный (текущий): ${simulatedCurrent.toFixed(1)}% | 
        Симулированный (новый): ${simulatedNew.toFixed(1)}% | 
        Коэффициент: ${calibrationCoef.toFixed(3)} | 
        Боёв: ${totalFights}
    `;
    
    btn.disabled = false;
    isRunning = false;
    progress.textContent = '✅ Готово!';
}

        window.runGradient = runGradient;
        
        loadData();
    </script>
</body>
</html>
