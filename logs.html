<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Логи</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', 'Arial', sans-serif; 
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.06), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(163, 113, 247, 0.08), transparent 40%),
                linear-gradient(135deg, #0b0f14 0%, #0d1117 40%, #0a0d12 100%);
            color: #e6edf3; 
            min-height: 100vh;
            padding: 20px;
        }
        h1 { 
            color: #ffd700; 
            text-align: center; 
            margin: 15px 0 25px; 
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 215, 0, 0.3);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }
        .nav-wrapper { margin-bottom: 30px; }
        .nav-toggle {
            display: none;
            width: 100%;
            padding: 12px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 25px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }
        .page-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .page-nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: #21262d;
            border: 1px solid #30363d;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .page-nav a:hover { color: #ffd700; border-color: #ffd700; background: #2a303c; }
        .page-nav a.active { background: #ffd700; color: #0d1117; font-weight: bold; border-color: #ffd700; }
        .logs-container { max-width: 850px; margin: 0 auto; }
        
        .controls { 
            margin-bottom: 25px; 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            flex-wrap: wrap;
        }
        .refresh-btn {
            background: #21262d; 
            border: 1px solid #ffd700; 
            color: #ffd700;
            padding: 9px 18px; 
            border-radius: 25px; 
            cursor: pointer;
            font-size: 14px; 
            font-weight: bold; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            height: 40px;
        }
        .refresh-btn:hover { background: #ffd700; color: #0d1117; }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 25px;
            padding: 0 15px;
            height: 40px;
        }
        .search-wrapper span {
            color: #8b949e;
            margin-right: 8px;
        }
        .search-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            width: 180px;
            outline: none;
            padding: 8px 0;
        }
        .search-input:focus { border: none; }
        .search-input::placeholder { color: #8b949e; }
        .log-count { 
            color: #8b949e; 
            font-size: 14px; 
            margin-left: auto;
            white-space: nowrap;
        }
        .last-updated {
            color: #8b949e; 
            font-size: 13px; 
            padding: 5px 15px; 
            background: #21262d; 
            border-radius: 20px;
            border: 1px solid #30363d;
            white-space: nowrap;
        }
        .last-updated span { color: #ffd700; font-weight: bold; }
        
        .log-item {
            background: #161b22; 
            border-radius: 12px; 
            padding: 15px 20px;
            border: 1px solid #30363d; 
            margin-bottom: 20px;
        }
        .log-header {
            display: grid;
            grid-template-columns: 45px 1fr auto 1fr;
            align-items: center;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 10px;
        }
        .log-number { color: #ffd700; font-weight: bold; }
        .log-header-left { text-align: left; padding-left: 5px; }
        .log-header-center { text-align: center; font-weight: bold; color: #ffd700; padding: 0 10px; }
        .log-header-right { text-align: right; padding-right: 5px; }
        .round-row {
            display: grid; 
            grid-template-columns: 45px 1fr 50px 1fr;
            padding: 4px 0; 
            border-bottom: 1px solid #30363d40;
            font-family: 'Consolas', monospace; 
            font-size: 13px;
        }
        .round-row:last-child { border-bottom: none; }
        .round-num { color: #8b949e; }
        .round-p1 { color: #e6edf3; text-align: right; padding-right: 8px; }
        .round-p2 { color: #e6edf3; text-align: left; padding-left: 8px; }
        .round-vs { text-align: center; color: #ffd700; }
        .cup { color: #ffd700; }
        .lightning { color: #ffd700; }
        .crit { color: #ff6b6b; }
        .miss { color: #8b949e; }
        .loading { text-align: center; padding: 60px; color: #8b949e; }

        /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.8em; }
            .nav-toggle { display: block; }
            .page-nav { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
            .page-nav.show { display: flex; }
            .page-nav a { text-align: center; padding: 10px; }
            
            .controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .refresh-btn { grid-column: 1; justify-content: center; }
            .search-wrapper { grid-column: 2; width: 100%; }
            .search-input { width: 100%; }
            .log-count { grid-column: 1 / -1; text-align: center; margin-left: 0; }
            .last-updated { grid-column: 1 / -1; text-align: center; margin-left: 0; }
            
            .log-item { padding: 12px; }
            
            .log-header {
                grid-template-columns: 30px 1fr auto 1fr;
                font-size: 12px;
                gap: 3px;
            }
            
            /* ЗНАЧКИ СВЕРХУ, НИК ПОД НИМИ */
            .log-header-left, .log-header-right {
                display: flex !important;
                flex-direction: column !important;
                line-height: 1.3 !important;
            }
            .log-header-left { align-items: flex-start !important; text-align: left !important; }
            .log-header-right { align-items: flex-end !important; text-align: right !important; }
            
            .log-emoji {
                white-space: nowrap !important;
            }
            .log-name {
                word-break: break-word !important;
                white-space: normal !important;
            }
            
            .log-header-center {
                padding: 0 3px;
                white-space: nowrap;
            }
            
            .round-row {
                grid-template-columns: 30px 1fr 30px 1fr;
                font-size: 11px;
            }
            .round-p1 { text-align: right; padding-right: 5px; }
            .round-p2 { text-align: left; padding-left: 5px; }
        }
    </style>
</head>
<body>
    <h1>ПОСЛЕДНИЕ БОИ</h1>
    
    <div class="nav-wrapper">
        <button class="nav-toggle" id="navToggle">☰ Меню</button>
        <div class="page-nav" id="pageNav">
            <a href="index.html">📊 Статистика</a>
            <a href="balance.html">⚖️ Баланс</a>
            <a href="guide.html">⚔️ Гайд</a>
            <a href="lore.html">📜 Лор Этерниса</a>
            <a href="hall.html">🏆 Зал Славы</a>
            <a href="logs.html" class="active">📜 Логи</a>
            <a href="simulator.html">🧪 Симулятор</a>
        </div>
    </div>
    
    <div class="logs-container">
        <div class="controls">
            <button class="refresh-btn" onclick="loadLogs()">🔄 Обновить</button>
            <div class="search-wrapper">
                <span>🔍</span>
                <input type="text" id="logSearch" class="search-input" placeholder="Поиск по игроку..." oninput="filterLogs()">
            </div>
            <span class="log-count" id="logCount"></span>
            <div class="last-updated" id="lastUpdated">🕐 <span>—</span></div>
        </div>
        <div id="logs-content"><div class="loading">⏳ Загрузка...</div></div>
    </div>
    
<script>
    const navToggle = document.getElementById('navToggle');
    const pageNav = document.getElementById('pageNav');
    navToggle.addEventListener('click', () => {
        pageNav.classList.toggle('show');
        navToggle.textContent = pageNav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
    });

    const LOGS_URL = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/recent_fights.json';
    const API_URL = 'https://api.github.com/repos/rvotaenotaTTV/dnd-stats/commits?path=recent_fights.json&page=1&per_page=1';
    
    let allFights = [];

    function pluralize(n, one, two, five) {
        if (n % 10 === 1 && n % 100 !== 11) return one;
        if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
        return five;
    }

    function colorize(text) {
        return text
            .replace(/🏆/g, '<span class="cup">🏆</span>')
            .replace(/⚡/g, '<span class="lightning">⚡</span>')
            .replace(/💥\d+/g, m => `<span class="crit">${m}</span>`)
            .replace(/❌/g, '<span class="miss">❌</span>')
            .replace(/💨/g, '<span class="miss">💨</span>')
            .replace(/🛡/g, '<span class="miss">🛡</span>');
    }

    function splitEmojiAndName(text) {
        const match = text.match(/^([🏆⚡💀🧑🧝🧔👹✨🗡️🛡️🔮🥋🏹🪓✝️👁️🎸🌿⚙️🦴]+)\s+(.+)$/);
        if (match) {
            return { emoji: match[1], name: match[2] };
        }
        return { emoji: '', name: text };
    }

    function renderLog(fight, index, total) {
        const fullLog = fight.FullLog;
        const parts = fullLog.split(' | ');
        const header = parts[0];
        const rounds = parts.slice(1);
        const number = total - index;

const cupMatch = header.match(/🏆(.+?)\s+\d/);
const lightningMatch = header.match(/⚡(.+?)\s+\d/);
const winner = cupMatch ? cupMatch[1].replace(/[🏆⚡]/g, '').trim() : null;
const first = lightningMatch ? lightningMatch[1].replace(/[🏆⚡]/g, '').trim() : null;
const needSwap = (winner && first) ? winner !== first : false;

        const headerMatch = header.match(/^(.+?)\s+(\d+:\d+)\s+(.+)$/);
        let left = '', center = '', right = '';
        if (headerMatch) {
            left = headerMatch[1];
            center = headerMatch[2];
            right = headerMatch[3];
        }

        const isMobile = window.innerWidth <= 768;
        const leftParts = splitEmojiAndName(left);
        const rightParts = splitEmojiAndName(right);

        let roundsHtml = '';
        rounds.forEach((r, i) => {
            let [hit1, hit2] = r.split(':');
            if (needSwap) [hit1, hit2] = [hit2, hit1];
            
            roundsHtml += `<div class="round-row">
                <span class="round-num">R${i+1}</span>
                <span class="round-p1">${colorize(hit1)}</span>
                <span class="round-vs">:</span>
                <span class="round-p2">${colorize(hit2)}</span>
            </div>`;
        });

        const leftContent = isMobile 
            ? `<span class="log-emoji">${colorize(leftParts.emoji)}</span><span class="log-name">${leftParts.name}</span>`
            : colorize(left);
            
        const rightContent = isMobile 
            ? `<span class="log-emoji">${colorize(rightParts.emoji)}</span><span class="log-name">${rightParts.name}</span>`
            : colorize(right);

        return `<div class="log-item">
            <div class="log-header">
                <span class="log-number">#${number}</span>
                <span class="log-header-left">${leftContent}</span>
                <span class="log-header-center">${center}</span>
                <span class="log-header-right">${rightContent}</span>
            </div>
            <div class="rounds-table">${roundsHtml}</div>
        </div>`;
    }

    function filterLogs() {
        const searchText = document.getElementById('logSearch').value.toLowerCase().trim();
        const content = document.getElementById('logs-content');
        
        if (!allFights.length) return;
        
        if (!searchText) {
            let html = '';
            const total = allFights.length;
            [...allFights].reverse().forEach((f, i) => { html += renderLog(f, i, total); });
            content.innerHTML = html;
            document.getElementById('logCount').textContent = `Всего: ${total} ${pluralize(total, 'бой', 'боя', 'боёв')}`;
            return;
        }
        
        const filtered = allFights.filter(f => 
            f.FullLog.toLowerCase().includes(searchText)
        );
        
        if (filtered.length === 0) {
            content.innerHTML = '<div class="loading">🔍 Ничего не найдено</div>';
            document.getElementById('logCount').textContent = '';
            return;
        }
        
        let html = '';
        const total = filtered.length;
        [...filtered].reverse().forEach((f, i) => { html += renderLog(f, i, total); });
        content.innerHTML = html;
        document.getElementById('logCount').textContent = `Найдено: ${total} ${pluralize(total, 'бой', 'боя', 'боёв')}`;
    }

    function loadLogs() {
        const content = document.getElementById('logs-content');
        content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

        fetch(API_URL)
            .then(r => r.json())
            .then(commits => {
                if (commits && commits.length > 0) {
                    const d = new Date(commits[0].commit.committer.date);
                    const timeStr = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    const dateStr = d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
                    document.getElementById('lastUpdated').innerHTML = `🕐 <span>${dateStr} ${timeStr}</span> (до 5 мин)`;
                }
            })
            .catch(() => {});

        fetch(LOGS_URL + '?v=' + Date.now())
            .then(r => r.json())
            .then(fights => {
                if (!fights || fights.length === 0) {
                    content.innerHTML = '<div class="loading">📜 Логов пока нет</div>';
                    document.getElementById('logCount').textContent = '';
                    return;
                }
                allFights = fights;
                filterLogs();
            })
            .catch(err => {
                content.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            });
    }

    loadLogs();
</script>
</body>
</html>
