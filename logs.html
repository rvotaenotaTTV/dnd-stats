<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Логи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #11161d;
            --bg-card: #161c24;
            --bg-elevated: #1c2330;
            --border-subtle: #252d38;
            --text-primary: #e8edf4;
            --text-secondary: #8b95a5;
            --text-muted: #5c6675;
            --gold: #ffd700;
            --purple: #a371f7;
            --red: #e5534b;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-gold: 0 0 20px rgba(255,215,0,0.15);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at 15% 10%, rgba(255,215,0,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 20%, rgba(163,113,247,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255,215,0,0.02) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px 24px 40px; }

        .header { text-align: center; padding: 30px 0 20px; }

        .header-title {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffd700 0%, #f0a500 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        .nav-wrapper { margin-bottom: 28px; }

        .nav-toggle {
            display: none;
            width: 100%;
            padding: 14px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            color: var(--gold);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: var(--transition);
        }

        .nav-toggle:hover { background: var(--bg-elevated); }

        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle);
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }

        .nav-link:hover { color: var(--text-primary); background: var(--bg-elevated); }

        .nav-link.active {
            background: var(--gold);
            color: var(--bg-primary);
            font-weight: 700;
            box-shadow: var(--shadow-gold);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: var(--gold); color: var(--bg-primary); border-color: var(--gold); }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: 25px;
            padding: 0 14px;
            height: 40px;
            gap: 8px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            width: 160px;
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .log-info {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-left: auto;
            white-space: nowrap;
        }

        /* Log Card */
        .log-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }

        .log-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        .log-header {
            display: grid;
            grid-template-columns: 40px 1fr auto 1fr;
            align-items: center;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.85rem;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 8px;
        }

        .log-num { color: var(--gold); font-weight: 700; }

        .log-header-left { text-align: left; padding-left: 4px; }
        .log-header-right { text-align: right; padding-right: 4px; }
        .log-header-center { text-align: center; font-weight: 700; color: var(--gold); padding: 0 8px; }

        /* Rounds */
        .round-row {
            display: grid;
            grid-template-columns: 40px 1fr 30px 1fr;
            padding: 3px 0;
            border-bottom: 1px solid rgba(37,45,56,0.4);
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.8rem;
        }

        .round-row:last-child { border-bottom: none; }

        .round-num { color: var(--text-muted); }
        .round-p1 { color: var(--text-primary); text-align: right; padding-right: 6px; }
        .round-p2 { color: var(--text-primary); text-align: left; padding-left: 6px; }
        .round-vs { text-align: center; color: var(--gold); }

        .cup { color: var(--gold); }
        .lightning { color: var(--gold); }
        .crit { color: var(--red); }
        .miss { color: var(--text-muted); }

        .status-message { text-align: center; padding: 40px; color: var(--text-secondary); }

        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid var(--border-subtle);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .container { padding: 12px 14px 32px; }

            .nav-toggle { display: block; }

            .nav-bar {
                display: none;
                flex-direction: column;
                gap: 2px;
                margin-top: 8px;
                padding: 4px;
            }

            .nav-bar.show { display: flex; }

            .nav-link {
                padding: 12px 16px;
                border-radius: var(--radius-sm);
                justify-content: center;
            }

            .header-title { font-size: 1.8rem; }

            .controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .btn { grid-column: 1; justify-content: center; }
            .search-box { grid-column: 2; }
            .search-box input { width: 100%; }
            .log-info { grid-column: 1 / -1; text-align: center; margin-left: 0; }

            .log-card { padding: 12px 10px; }

            .log-header {
                grid-template-columns: 28px 1fr auto 1fr;
                font-size: 0.78rem;
            }

            .log-header-left, .log-header-right {
                display: flex;
                flex-direction: column;
                line-height: 1.3;
            }

            .log-header-left { align-items: flex-start; }
            .log-header-right { align-items: flex-end; }

            .round-row {
                grid-template-columns: 28px 1fr 24px 1fr;
                font-size: 0.72rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header-title">ЛОГИ БОЁВ</h1>
            <p class="header-subtitle">Последние сражения на Арене</p>
        </header>

        <div class="nav-wrapper">
            <button class="nav-toggle" onclick="toggleNav()">☰ Меню</button>
            <nav class="nav-bar" id="pageNav">
                <a href="index.html" class="nav-link">📊 Статистика</a>
                <a href="logs.html" class="nav-link active">📜 Логи</a>
                <a href="calc.html" class="nav-link">🎲 Калькулятор</a>
                <a href="balance.html" class="nav-link">⚖️ Баланс</a>
                <a href="simulator.html" class="nav-link">🧪 Симулятор</a>
                <a href="gradient.html" class="nav-link">📈 Градиент</a>
                <a href="guide.html" class="nav-link">⚔️ Гайд</a>
                <a href="hall.html" class="nav-link">🏆 Зал Славы</a>
                <a href="lore.html" class="nav-link">📜 Лор</a>
                <a href="tavern.html" class="nav-link">🍺 Таверна</a>
                <a href="dungeon.html" class="nav-link">🏔 Подземелье</a>
            </nav>
        </div>

        <div class="controls">
            <button class="btn" onclick="loadLogs()">🔄 Обновить</button>
            <div class="search-box">
                <span style="color:var(--text-muted);">🔍</span>
                <input type="text" id="logSearch" placeholder="Поиск..." oninput="filterLogs()">
            </div>
            <span class="log-info" id="logCount"></span>
        </div>

        <div id="logs-content">
            <div class="status-message"><div class="spinner"></div><p>Загрузка...</p></div>
        </div>
    </div>

    <script>
        function toggleNav() {
            const nav = document.getElementById('pageNav');
            const btn = document.querySelector('.nav-toggle');
            nav.classList.toggle('show');
            btn.textContent = nav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                const nav = document.getElementById('pageNav');
                const btn = document.querySelector('.nav-toggle');
                nav.classList.remove('show');
                if (btn) btn.textContent = '☰ Меню';
            });
        });

        let allFights = [];

        function plural(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }

        function colorize(text) {
            return text
                .replace(/🏆/g, '<span class="cup">🏆</span>')
                .replace(/⚡/g, '<span class="lightning">⚡</span>')
                .replace(/💥\d+/g, m => `<span class="crit">${m}</span>`)
                .replace(/❌/g, '<span class="miss">❌</span>')
                .replace(/💨/g, '<span class="miss">💨</span>')
                .replace(/🛡/g, '<span class="miss">🛡</span>');
        }

        function renderLog(fight, index, total) {
            const parts = fight.FullLog.split(' | ');
            const header = parts[0];
            const rounds = parts.slice(1);
            const number = total - index;

            const headerMatch = header.match(/^(.+?)\s+(\d+:\d+)\s+(.+)$/);
            let left = '', center = '', right = '';
            if (headerMatch) { left = headerMatch[1]; center = headerMatch[2]; right = headerMatch[3]; }

            const hasLightningLeft = header.indexOf('⚡') < header.indexOf(':');

            let roundsHtml = '';
            rounds.forEach((r, i) => {
                let [hit1, hit2] = r.split(':');
                if (!hasLightningLeft) [hit1, hit2] = [hit2, hit1];
                roundsHtml += `<div class="round-row">
                    <span class="round-num">R${i+1}</span>
                    <span class="round-p1">${colorize(hit1)}</span>
                    <span class="round-vs">:</span>
                    <span class="round-p2">${colorize(hit2)}</span>
                </div>`;
            });

            return `<div class="log-card">
                <div class="log-header">
                    <span class="log-num">#${number}</span>
                    <span class="log-header-left">${colorize(left)}</span>
                    <span class="log-header-center">${center}</span>
                    <span class="log-header-right">${colorize(right)}</span>
                </div>
                <div class="rounds">${roundsHtml}</div>
            </div>`;
        }

        function filterLogs() {
            const searchText = document.getElementById('logSearch').value.toLowerCase().trim();
            const content = document.getElementById('logs-content');
            if (!allFights.length) return;

            if (!searchText) {
                let html = ''; const total = allFights.length;
                [...allFights].reverse().forEach((f, i) => { html += renderLog(f, i, total); });
                content.innerHTML = html;
                document.getElementById('logCount').textContent = `Всего: ${total} ${plural(total, 'бой', 'боя', 'боёв')}`;
                return;
            }

            const filtered = allFights.filter(f => f.FullLog.toLowerCase().includes(searchText));
            if (filtered.length === 0) {
                content.innerHTML = '<div class="status-message">🔍 Ничего не найдено</div>';
                document.getElementById('logCount').textContent = '';
                return;
            }

            let html = ''; const total = filtered.length;
            [...filtered].reverse().forEach((f, i) => { html += renderLog(f, i, total); });
            content.innerHTML = html;
            document.getElementById('logCount').textContent = `Найдено: ${total} ${plural(total, 'бой', 'боя', 'боёв')}`;
        }

        const LOGS_URL_RAW = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/stats_data.json';
        const LOGS_URL_CDN = 'https://cdn.jsdelivr.net/gh/rvotaenotaTTV/dnd-stats@main/stats_data.json';

        function fetchWithTimeout(url, timeout = 3000) {
            return Promise.race([
                fetch(url).then(r => { if (!r.ok) throw new Error('Status ' + r.status); return r; }),
                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))
            ]);
        }

        function loadLogs() {
            const content = document.getElementById('logs-content');
            content.innerHTML = '<div class="status-message"><div class="spinner"></div><p>Загрузка...</p></div>';

            fetchWithTimeout(LOGS_URL_RAW + '?v=' + Date.now())
                .catch(() => fetchWithTimeout(LOGS_URL_CDN + '?v=' + Date.now()))
                .then(r => r.json())
                .then(data => {
                    const fights = data.fights || [];
                    if (!fights.length) {
                        content.innerHTML = '<div class="status-message">📜 Логов пока нет</div>';
                        document.getElementById('logCount').textContent = '';
                        return;
                    }
                    allFights = fights;
                    filterLogs();
                })
                .catch(() => {
                    content.innerHTML = '<div class="status-message" style="color:var(--red);">❌ Ошибка загрузки</div>';
                });
        }

        loadLogs();
    </script>
</body>
</html>
