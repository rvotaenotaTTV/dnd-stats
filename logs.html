<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логи</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.06), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(163, 113, 247, 0.08), transparent 40%),
                linear-gradient(135deg, #0b0f14 0%, #0d1117 40%, #0a0d12 100%);
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            color: #ffd700;
            text-align: center;
            margin: 15px 0 25px;
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }
        
        .nav-wrapper { margin-bottom: 30px; }
        .nav-toggle {
            display: none;
            width: 100%;
            padding: 12px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 25px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }
        .page-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .page-nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: #21262d;
            border: 1px solid #30363d;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .page-nav a:hover { color: #ffd700; border-color: #ffd700; background: #2a303c; }
        .page-nav a.active { background: #ffd700; color: #0d1117; font-weight: bold; border-color: #ffd700; }
        
        .logs-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .refresh-btn {
            background: #21262d;
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 10px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .refresh-btn:hover { background: #ffd700; color: #0d1117; }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8b949e;
            font-size: 14px;
        }
        .auto-refresh input {
            width: 18px;
            height: 18px;
            accent-color: #ffd700;
            cursor: pointer;
        }
        
        .log-count {
            color: #8b949e;
            font-size: 14px;
        }
        
        .last-updated {
            color: #8b949e;
            font-size: 13px;
            margin-left: auto;
            padding: 5px 12px;
            background: #21262d;
            border-radius: 20px;
        }
        .last-updated span { color: #ffd700; font-weight: bold; }
        
        .log-item {
            background: #161b22;
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid #30363d;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .log-item:hover { border-color: #ffd70040; background: #1a1f28; }
        .log-item.expanded { border-color: #ffd700; }
        
        .log-header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .log-number {
            color: #ffd700;
            font-weight: bold;
            opacity: 0.7;
            min-width: 40px;
        }
        .log-players {
            font-family: 'Consolas', monospace;
            font-size: 14px;
        }
        .winner-badge {
            background: #ffd700;
            color: #0d1117;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }
        .expand-hint {
            margin-left: auto;
            color: #8b949e;
            font-size: 12px;
        }
        
        .rounds-table {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
            display: none;
        }
        .log-item.expanded .rounds-table { display: block; }
        
        .round-row {
            display: grid;
            grid-template-columns: 80px 1fr 50px 1fr;
            gap: 10px;
            padding: 5px 0;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            border-bottom: 1px solid #30363d40;
        }
        .round-row:last-child { border-bottom: none; }
        .round-num { color: #8b949e; }
        .round-p1 { color: #e6edf3; }
        .round-vs { text-align: center; color: #ffd700; }
        .round-p2 { color: #e6edf3; text-align: right; }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #8b949e;
            font-size: 18px;
        }
        .empty-logs {
            text-align: center;
            padding: 60px;
            color: #8b949e;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
        }
        .error-message {
            background: #2a1515;
            border: 1px solid #ff6b6b;
            color: #ff6b6b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            body { padding: 10px; }
            .nav-toggle { display: block; }
            .page-nav { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
            .page-nav.show { display: flex; }
            .page-nav a { text-align: center; padding: 10px; }
            .log-item { padding: 12px; }
            .log-header { flex-wrap: wrap; }
            .expand-hint { margin-left: 0; width: 100%; margin-top: 5px; }
            .round-row { grid-template-columns: 50px 1fr 30px 1fr; font-size: 11px; }
            .controls { flex-wrap: wrap; }
            .last-updated { margin-left: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <h1>⚔️ ПОСЛЕДНИЕ БОИ</h1>
    
    <div class="nav-wrapper">
        <button class="nav-toggle">☰ Меню</button>
        <div class="page-nav">
            <a href="index.html">📊 Статистика</a>
            <a href="balance.html">⚖️ Баланс</a>
            <a href="guide.html">⚔️ Гайд</a>
            <a href="hall.html">🏆 Зал Славы</a>
            <a href="lore.html">📜 Лор Этерниса</a>
            <a href="logs.html" class="active">📜 Логи</a>
        </div>
    </div>
    
    <div class="logs-container">
        <div class="controls">
            <button class="refresh-btn" onclick="loadLogs()">🔄 Обновить</button>
            <label class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked> Автообновление (30с)
            </label>
            <span class="log-count" id="logCount"></span>
            <div class="last-updated" id="lastUpdated">🕐 <span>—</span></div>
        </div>
        
        <div id="logs-content">
            <div class="loading">⏳ Загрузка логов...</div>
        </div>
    </div>
    
    <script>
        const LOGS_URL = 'https://cdn.jsdelivr.net/gh/rvotaenotaTTV/dnd-stats@main/recent_fights.json';
        const API_URL = 'https://api.github.com/repos/rvotaenotaTTV/dnd-stats/commits?path=recent_fights.json&page=1&per_page=1';
        let autoRefreshTimer = null;
        
        function pluralize(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }
        
        function parseLog(fullLog) {
            // Пример: "⚡💀🏹 rvotaenota 13:27 🧑🎸 ursona | 💨:7 | 3:💨 | 💨:💨 | ❌:5 | ❌:3 | 3:❌ | 3:9 | 4:3"
            const parts = fullLog.split(' | ');
            const header = parts[0];
            const roundsStr = parts.slice(1).join(' | ');
            
            // Парсим заголовок
            const headerMatch = header.match(/^(⚡)?(.*?)\s+(\d+):(\d+)\s+(.*?)$/);
            if (!headerMatch) return null;
            
            const firstStrike = headerMatch[1] || '';
            const p1Full = headerMatch[2].trim();
            const dmg1 = parseInt(headerMatch[3]);
            const dmg2 = parseInt(headerMatch[4]);
            const p2Full = headerMatch[5].trim();
            
            // Определяем победителя
            const winner = dmg1 > dmg2 ? p1Full : p2Full;
            
            // Парсим раунды
            const rounds = [];
            const roundParts = roundsStr.split(' | ');
            roundParts.forEach(r => {
                const [hit1, hit2] = r.split(':');
                rounds.push({ p1: hit1, p2: hit2 });
            });
            
            return {
                firstStrike,
                p1Full,
                p2Full,
                dmg1,
                dmg2,
                winner,
                rounds,
                totalRounds: rounds.length
            };
        }
        
        function renderLog(fight, index, total) {
            const parsed = parseLog(fight.FullLog);
            if (!parsed) return `<div class="log-item">❌ Ошибка парсинга: ${fight.FullLog}</div>`;
            
            const number = total - index;
            const winnerIsP1 = parsed.winner === parsed.p1Full;
            
            let roundsHtml = '';
            parsed.rounds.forEach((r, i) => {
                roundsHtml += `
                    <div class="round-row">
                        <span class="round-num">Раунд ${i+1}</span>
                        <span class="round-p1">${r.p1}</span>
                        <span class="round-vs">vs</span>
                        <span class="round-p2">${r.p2}</span>
                    </div>
                `;
            });
            
            return `
                <div class="log-item" onclick="this.classList.toggle('expanded')">
                    <div class="log-header">
                        <span class="log-number">#${number}</span>
                        <span class="log-players">
                            ${parsed.firstStrike} ${parsed.p1Full} ${parsed.dmg1}:${parsed.dmg2} ${parsed.p2Full}
                            ${winnerIsP1 ? 
                                `<span class="winner-badge">👑 ${parsed.p1Full.split(' ').slice(1).join(' ')}</span>` : 
                                `<span class="winner-badge">👑 ${parsed.p2Full.split(' ').slice(1).join(' ')}</span>`
                            }
                        </span>
                        <span class="expand-hint">▶ ${parsed.totalRounds} раундов (нажми)</span>
                    </div>
                    <div class="rounds-table">
                        ${roundsHtml}
                    </div>
                </div>
            `;
        }
        
        function loadLogs() {
            const content = document.getElementById('logs-content');
            content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            
            // Обновляем время последнего коммита
            fetch(API_URL)
                .then(r => r.json())
                .then(commits => {
                    if (commits && commits.length > 0) {
                        const d = new Date(commits[0].commit.committer.date);
                        const timeStr = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        const dateStr = d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
                        document.getElementById('lastUpdated').innerHTML = `🕐 <span>${dateStr} ${timeStr}</span>`;
                    }
                })
                .catch(() => {});
            
            // Загружаем логи
            fetch(LOGS_URL + '?v=' + Date.now())
                .then(r => r.json())
                .then(fights => {
                    if (!fights || fights.length === 0) {
                        content.innerHTML = '<div class="empty-logs">📜 Логов пока нет</div>';
                        document.getElementById('logCount').textContent = '';
                        return;
                    }
                    
                    let html = '';
                    const total = fights.length;
                    
                    fights.reverse().forEach((fight, i) => {
                        html += renderLog(fight, i, total);
                    });
                    
                    content.innerHTML = html;
                    document.getElementById('logCount').textContent = `Всего: ${total} ${pluralize(total, 'бой', 'боя', 'боёв')}`;
                })
                .catch(err => {
                    content.innerHTML = '<div class="error-message">❌ Ошибка загрузки</div>';
                    console.error(err);
                });
        }
        
        function toggleAutoRefresh() {
            if (document.getElementById('autoRefresh').checked) {
                autoRefreshTimer = setInterval(loadLogs, 30000);
            } else {
                clearInterval(autoRefreshTimer);
            }
        }
        
        loadLogs();
        document.getElementById('autoRefresh').addEventListener('change', toggleAutoRefresh);
        toggleAutoRefresh();
        
        const navToggle = document.querySelector('.nav-toggle');
        const pageNav = document.querySelector('.page-nav');
        navToggle.addEventListener('click', () => {
            pageNav.classList.toggle('show');
            navToggle.textContent = pageNav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
        });
    </script>
</body>
</html>
