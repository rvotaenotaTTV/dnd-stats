<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логи</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', 'Arial', sans-serif; 
            background: 
                radial-gradient(circle at 20% 20%, rgba(255, 215, 0, 0.06), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(163, 113, 247, 0.08), transparent 40%),
                linear-gradient(135deg, #0b0f14 0%, #0d1117 40%, #0a0d12 100%);
            color: #e6edf3; 
            min-height: 100vh;
            padding: 20px;
        }
        h1 { 
            color: #ffd700; 
            text-align: center; 
            margin: 15px 0 25px; 
            font-size: 2.5em;
            font-weight: 700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 215, 0, 0.3);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding-bottom: 10px;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .nav-wrapper { margin-bottom: 30px; }
        .nav-toggle {
            display: none;
            width: 100%;
            padding: 12px 20px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 25px;
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }
        .page-nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .page-nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: #21262d;
            border: 1px solid #30363d;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .page-nav a:hover { color: #ffd700; border-color: #ffd700; background: #2a303c; }
        .page-nav a.active { background: #ffd700; color: #0d1117; font-weight: bold; border-color: #ffd700; }

        /* ===== ЛОГИ ===== */
        .logs-container { max-width: 800px; margin: 0 auto; }
        .controls { 
            margin-bottom: 25px; display: flex; gap: 15px; align-items: center; 
            flex-wrap: wrap;
        }
        .refresh-btn {
            background: #21262d; border: 1px solid #ffd700; color: #ffd700;
            padding: 10px 24px; border-radius: 25px; cursor: pointer;
            font-size: 14px; font-weight: bold; transition: all 0.2s;
        }
        .refresh-btn:hover { background: #ffd700; color: #0d1117; }
        .log-count { color: #8b949e; font-size: 14px; }
        .last-updated {
            color: #8b949e; font-size: 13px; margin-left: auto;
            padding: 5px 12px; background: #21262d; border-radius: 20px;
        }
        .last-updated span { color: #ffd700; font-weight: bold; }
        .log-item {
            background: #161b22; border-radius: 12px; padding: 15px 20px;
            border: 1px solid #30363d; margin-bottom: 20px;
        }
        .log-header {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Consolas', monospace; font-size: 14px;
            padding-bottom: 10px; border-bottom: 1px solid #30363d; margin-bottom: 10px;
        }
        .log-number { color: #ffd700; font-weight: bold; min-width: 40px; }
        .log-players { flex: 1; text-align: center; }
        .round-row {
            display: grid; grid-template-columns: 45px 1fr 30px 1fr;
            padding: 4px 0; border-bottom: 1px solid #30363d40;
            font-family: 'Consolas', monospace; font-size: 13px;
        }
        .round-row:last-child { border-bottom: none; }
        .round-num { color: #8b949e; }
        .round-p1 { color: #e6edf3; text-align: right; padding-right: 5px; }
        .round-p2 { color: #e6edf3; text-align: left; padding-left: 5px; }
        .round-vs { text-align: center; color: #ffd700; }
        .cup { color: #ffd700; }
        .lightning { color: #ffd700; }
        .crit { color: #ff6b6b; }
        .miss { color: #8b949e; }
        .loading { text-align: center; padding: 60px; color: #8b949e; }

        /* ===== МОБИЛЬНАЯ ВЕРСИЯ ===== */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.8em; }
            .nav-toggle { display: block; }
            .page-nav { display: none; flex-direction: column; gap: 8px; margin-top: 10px; }
            .page-nav.show { display: flex; }
            .page-nav a { text-align: center; padding: 10px; }
            .last-updated { margin-left: 0; width: 100%; text-align: center; }
            .log-item { padding: 12px; }
            .round-row { grid-template-columns: 40px 1fr 25px 1fr; font-size: 12px; }
        }
    </style>
</head>
<body>
    <h1>ПОСЛЕДНИЕ БОИ</h1>
    
    <div class="nav-wrapper">
        <button class="nav-toggle" id="navToggle">☰ Меню</button>
        <div class="page-nav" id="pageNav">
            <a href="index.html">📊 Статистика</a>
            <a href="balance.html">⚖️ Баланс</a>
            <a href="guide.html">⚔️ Гайд</a>
            <a href="lore.html">📜 Лог Этерниса</a>
            <a href="hall.html">🏆 Зал Славы</a>
            <a href="logs.html" class="active">📜 Логи</a>
        </div>
    </div>
    
    <div class="logs-container">
        <div class="controls">
            <button class="refresh-btn" onclick="loadLogs()">🔄 Обновить</button>
            <span class="log-count" id="logCount"></span>
            <div class="last-updated" id="lastUpdated">🕐 <span>—</span></div>
        </div>
        <div id="logs-content"><div class="loading">⏳ Загрузка...</div></div>
    </div>
    
    <script>
        // Бургер-меню
        const navToggle = document.getElementById('navToggle');
        const pageNav = document.getElementById('pageNav');
        navToggle.addEventListener('click', () => {
            pageNav.classList.toggle('show');
            navToggle.textContent = pageNav.classList.contains('show') ? '✕ Закрыть' : '☰ Меню';
        });

        const LOGS_URL = 'https://raw.githubusercontent.com/rvotaenotaTTV/dnd-stats/main/recent_fights.json';
        const API_URL = 'https://api.github.com/repos/rvotaenotaTTV/dnd-stats/commits?path=recent_fights.json&page=1&per_page=1';

        function pluralize(n, one, two, five) {
            if (n % 10 === 1 && n % 100 !== 11) return one;
            if (n % 10 >= 2 && n % 10 <= 4 && (n % 100 < 10 || n % 100 >= 20)) return two;
            return five;
        }

        function colorize(text) {
            return text
                .replace(/🏆/g, '<span class="cup">🏆</span>')
                .replace(/⚡/g, '<span class="lightning">⚡</span>')
                .replace(/💥\d+/g, m => `<span class="crit">${m}</span>`)
                .replace(/❌/g, '<span class="miss">❌</span>')
                .replace(/💨/g, '<span class="miss">💨</span>')
                .replace(/🛡/g, '<span class="miss">🛡</span>');
        }

        function renderLog(fight, index, total) {
            const fullLog = fight.FullLog;
            const parts = fullLog.split(' | ');
            const header = parts[0];
            const rounds = parts.slice(1);

            const number = total - index;

            let roundsHtml = '';
            rounds.forEach((r, i) => {
                const [hit1, hit2] = r.split(':');
                roundsHtml += `<div class="round-row">
                    <span class="round-num">R${i+1}</span>
                    <span class="round-p1">${colorize(hit1)}</span>
                    <span class="round-vs">vs</span>
                    <span class="round-p2">${colorize(hit2)}</span>
                </div>`;
            });

            return `<div class="log-item">
                <div class="log-header">
                    <span class="log-number">#${number}</span>
                    <span class="log-players">${colorize(header)}</span>
                </div>
                <div class="rounds-table">
                    ${roundsHtml}
                </div>
            </div>`;
        }

        function loadLogs() {
            const content = document.getElementById('logs-content');
            content.innerHTML = '<div class="loading">⏳ Загрузка...</div>';

            fetch(API_URL)
                .then(r => r.json())
                .then(commits => {
                    if (commits && commits.length > 0) {
                        const d = new Date(commits[0].commit.committer.date);
                        const timeStr = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                        const dateStr = d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' });
                        document.getElementById('lastUpdated').innerHTML = `🕐 <span>${dateStr} ${timeStr}</span>`;
                    }
                })
                .catch(() => {});

            fetch(LOGS_URL + '?v=' + Date.now())
                .then(r => r.json())
                .then(fights => {
                    if (!fights || fights.length === 0) {
                        content.innerHTML = '<div class="loading">📜 Логов пока нет</div>';
                        document.getElementById('logCount').textContent = '';
                        return;
                    }
                    let html = '';
                    const total = fights.length;
                    fights.reverse().forEach((f, i) => { html += renderLog(f, i, total); });
                    content.innerHTML = html;
                    document.getElementById('logCount').textContent = `Всего: ${total} ${pluralize(total, 'бой', 'боя', 'боёв')}`;
                })
                .catch(err => {
                    content.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
                });
        }

        loadLogs();
    </script>
</body>
</html>
